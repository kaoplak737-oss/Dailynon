<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Access Granted</title>
    
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "w1u9rimu1f");
    </script>

    <style>
        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        
        /* Анимация загрузки */
        .loader { width: 60px; height: 60px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Основная карточка */
        .profile-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #333; display: none; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .blur-media { width: 100%; height: 200px; background: url('2.jpg') center; background-size: cover; border-radius: 15px; filter: blur(15px); margin-bottom: 20px; border: 1px solid #444; }
        .status { color: #4cd964; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        h2 { font-size: 22px; margin-bottom: 12px; }
        p { color: #ccc; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }

        .btn { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; font-size: 16px; box-shadow: 0 8px 20px rgba(255, 45, 85, 0.4); transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <!-- Состояние загрузки -->
    <div id="loading-state">
        <div class="loader"></div>
        <p id="l-text">Connecting...</p>
    </div>

    <!-- Карточка перехода -->
    <div class="profile-card" id="card">
        <span class="status" id="s-text">Online Now</span>
        <h2 id="h-text">Profile Found!</h2>
        <div class="blur-media"></div>
        <p id="p-text">To view full profile and start chatting, click the button below.</p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn" id="b-text">OPEN CHAT</a>
    </div>
</div>

<script>
    const lang = {
        ru: { l: "Поиск профиля TikTok...", h: "Профиль найден!", s: "Сейчас в сети", p: "Чтобы посмотреть полный профиль и начать чат, нажмите кнопку ниже.", b: "ПЕРЕЙТИ В ЧАТ" },
        uk: { l: "Пошук профілю TikTok...", h: "Профіль знайдено!", s: "Зараз онлайн", p: "Щоб переглянути повний профіль та почати чат, натисніть кнопку нижче.", b: "ПЕРЕЙТИ ДО ЧАТУ" },
        kk: { l: "Профиль ізделуде...", h: "Профиль табылды!", s: "Қазір желіде", p: "Толық профильді көру және чатты бастау үшін төмендегі түймені басыңыз.", b: "ЧАТҚА ӨТУ" },
        pl: { l: "Szukanie profilu...", h: "Znaleziono profil!", s: "Teraz online", p: "Aby zobaczyć pełny profil i rozpocząć czat, kliknij przycisk poniżej.", b: "PRZEJDŹ DO CZATU" },
        en: { l: "Scanning TikTok ID...", h: "Profile Found!", s: "Online Now", p: "To view full profile and start chatting, click the button below.", b: "OPEN CHAT" }
    };

    // Определяем язык
    let uLang = navigator.language.split('-')[0];
    if(uLang === 'ua' || uLang === 'be') uLang = (uLang === 'ua') ? 'uk' : 'ru';
    const cur = lang[uLang] || lang.en;

    // Применяем тексты
    Object.keys(cur).forEach(key => {
        const el = document.getElementById(key + (key.length === 1 ? '-text' : ''));
        if(el) el.innerText = cur[key];
    });

    // Имитация загрузки и показ карточки
    setTimeout(() => {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('card').style.display = 'block';
    }, 2000);
</script>

</body>
</html>
