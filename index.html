<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Messenger</title>
    <style>
        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; --gray: #8e8e93; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* Header */
        .header { background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(10px); padding: 15px; text-align: center; border-bottom: 1px solid #333; z-index: 100; position: sticky; top: 0; }
        .header h1 { font-size: 16px; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 10px rgba(255, 45, 85, 0.5); }
        
        /* List */
        #list-screen { height: 100vh; overflow-y: auto; padding-bottom: 100px; -webkit-overflow-scrolling: touch; background: linear-gradient(to bottom, #0b0b0d, #161618); }
        .chat-row { display: flex; padding: 16px; border-bottom: 1px solid #222; align-items: center; transition: background 0.3s; }
        .chat-row:active { background: #2c2c2e; }
        .avatar-container { position: relative; }
        .avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; background: var(--bg); }
        .online-dot { position: absolute; bottom: 4px; right: 4px; width: 12px; height: 12px; background: #4cd964; border-radius: 50%; border: 2px solid var(--bg); }
        .info { flex: 1; margin-left: 15px; overflow: hidden; }
        .name { font-weight: 700; font-size: 17px; color: #fff; margin-bottom: 4px; display: block; }
        .preview { color: var(--gray); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time { font-size: 12px; color: var(--gray); margin-left: 10px; }

        /* Sticky Footer */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.95); padding: 15px 20px 30px; border-top: 1px solid #333; z-index: 200; backdrop-filter: blur(15px); }
        .btn-reg { background: linear-gradient(45deg, var(--accent), #ff5e3a); color: #fff; text-align: center; padding: 16px; border-radius: 16px; font-weight: 800; text-decoration: none; display: block; font-size: 16px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 45, 85, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        /* Chat Screen */
        #chat-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; flex-direction: column; }
        .chat-head { background: var(--card); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .back { font-size: 32px; color: var(--accent); margin-right: 12px; cursor: pointer; line-height: 1; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: url('https://i.ibb.co/3S6m8m0/bg-chat.png'); }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; align-self: flex-start; background: #262629; line-height: 1.4; color: #eee; position: relative; }
        .bubble::after { content: ""; position: absolute; left: -8px; bottom: 0; width: 15px; height: 15px; background: #262629; clip-path: polygon(100% 0, 0 100%, 100% 100%); }

        /* Typing Anim */
        .typing { display: none; align-self: flex-start; background: #262629; padding: 12px 16px; border-radius: 18px; margin-bottom: 10px; }
        .dot { height: 6px; width: 6px; background: var(--gray); border-radius: 50%; display: inline-block; animation: jump 1.4s infinite; margin-right: 3px; }
        @keyframes jump { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(8px); }
        .card { background: var(--card); width: 100%; max-width: 340px; border-radius: 30px; padding: 35px 25px; text-align: center; border: 1px solid #444; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .card h2 { font-size: 24px; color: #fff; margin-bottom: 15px; font-weight: 800; }
        .card p { font-size: 16px; color: #bbb; line-height: 1.5; margin-bottom: 25px; }
        .btn-main { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 17px; cursor: pointer; text-transform: uppercase; }

        /* Push Notification */
        #push-note { position: fixed; top: -100px; left: 10px; right: 10px; background: rgba(30, 30, 30, 0.95); padding: 15px; border-radius: 20px; display: flex; align-items: center; z-index: 10000; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #push-note.show { top: 15px; }
    </style>
</head>
<body>

<div id="push-note" onclick="showRegModal()">
    <img id="p-img" src="" style="width:50px; height:50px; border-radius:50%; margin-right:15px; object-fit:cover; border: 2px solid var(--accent);">
    <div style="flex:1"><b id="p-name" style="font-size:15px; color:var(--accent);"></b><p id="p-msg" style="font-size:14px; color:#fff; margin-top:2px;"></p></div>
</div>

<div class="header"><h1>Private Messenger</h1></div>

<div id="list-screen">
    <div id="chats-container"></div>
    <div class="bottom-nav">
        <a href="javascript:void(0)" onclick="showRegModal()" class="btn-reg" id="fix-btn">REGISTRATION</a>
    </div>
</div>

<div id="chat-screen">
    <div class="chat-head">
        <div class="back" onclick="handleBack()">‹</div>
        <img id="c-av" class="avatar" style="width:40px; height:40px; border:none; padding:0;">
        <span class="name" id="c-nm" style="margin-left:12px; font-size:16px;"></span>
    </div>
    <div class="msg-box" id="m-box" onclick="showRegModal()">
        <div id="typing-ui" class="typing"><div class="dot"></div><div class="dot" style="animation-delay: 0.2s"></div><div class="dot" style="animation-delay: 0.4s"></div></div>
    </div>
    <div class="input-bar" style="padding:15px 20px 35px; background:var(--card);" onclick="showRegModal()">
        <div id="input-placeholder" style="background:#2c2c2e; padding:12px 20px; border-radius:25px; color:var(--gray); font-size:15px;">...</div>
    </div>
</div>

<div id="exit-pop" class="modal">
    <div class="card"><h2 id="eh"></h2><p id="ep"></p><div class="btn-main" onclick="goLink()" id="ebtn"></div></div>
</div>

<div id="reg-modal" class="modal">
    <div class="card"><h2 id="mh"></h2><p id="mp"></p><div class="btn-main" onclick="goLink()" id="mbtn"></div></div>
</div>

<script>
    const languages = {
        uk: { eh: "ЗАЧЕКАЙ!", ep: "Поруч 147 дівчат хочуть познайомитись. Не йди!", ebtn: "ЗАЛИШИТИСЬ", mh: "Реєстрація", mp: "Для перегляду фото, відео та спілкування потрібно пройти швидку реєстрацію.", mbtn: "ПРОДОВЖИТИ", names: ["Оксана","Юля","Настя","Іра","Марина","Олена"], chats: [["Привіт! Ти тут новенький? 😊","Хочу тобі дещо показати..."]], push: ["Дивись що в мене є... 🔥","Відповідай мені! 😘"], fixBtn: "ШВИДКА РЕЄСТРАЦІЯ", ph: "Написати повідомлення..." },
        pl: { eh: "CZEKAJ!", ep: "147 dziewczyn w okolicy chce Cię poznać. Nie odchodź!", ebtn: "ZOSTAŃ", mh: "Rejestracja", mp: "Musisz się zarejestrować, aby czatować i oglądać wideo.", mbtn: "KONTYNUUJ", names: ["Kasia","Julia","Zuzanna","Maja","Lena","Natalia"], chats: [["Cześć! Jesteś tu nowy? 😊","Chcę Ci coś pokazać..."]], push: ["Zobacz co mam... 🔥","Odpowiedz mi! 😘"], fixBtn: "SZYBKA REJESTRACJA", ph: "Napisz wiadomość..." },
        ru: { eh: "ПОДОЖДИ!", ep: "Рядом 147 девушек хотят познакомиться. Не уходи!", ebtn: "ОСТАТЬСЯ", mh: "Регистрация", mp: "Для общения и просмотра видео нужно пройти быструю регистрацию.", mbtn: "ПРОДОЛЖИТЬ", names: ["Мария","Катя","Вика","Лена","Света","Анжела"], chats: [["Привет! Ты тут новенький? 😊","Хочу тебе кое-что показать..."]], push: ["Смотри что у меня есть... 🔥","Ответь мне! 😘"], fixBtn: "БЫСТРАЯ РЕГИСТРАЦИЯ", ph: "Написать сообщение..." },
        es: { eh: "¡ESPERA!", ep: "147 chicas cerca quieren conocerte.", ebtn: "QUEDARME", mh: "Registro", mp: "Regístrate para ver videos y chatear.", mbtn: "CONTINUAR", names: ["Lucía","Martina","Sofía","Valeria"], chats: [["¡Hola! ¿Eres nuevo? 😊","Tengo algo para ti..."]], push: ["Mira... 🔥","¡Responde! 😘"], fixBtn: "REGISTRO RÁPIDO", ph: "Escribir mensaje..." },
        en: { eh: "WAIT!", ep: "147 girls nearby want to meet you. Don't go!", ebtn: "STAY", mh: "Registration", mp: "You need to register to chat and watch videos.", mbtn: "CONTINUE", names: ["Emily","Chloe","Megan","Sarah"], chats: [["Hi! New here? 😊","I want to show you something..."]], push: ["Look at this... 🔥","Answer me! 😘"], fixBtn: "QUICK REGISTRATION", ph: "Type a message..." },
        de: { eh: "WARTE!", ep: "147 Mädchen wollen dich treffen.", ebtn: "BLEIBEN", mh: "Registrierung", mp: "Registrieren, um Videos anzusehen.", mbtn: "WEITER", names: ["Lina","Emma","Mia"], chats: [["Hi! Neu hier? 😊"]], push: ["Schau mal... 🔥"], fixBtn: "REGISTRIERUNG", ph: "Nachricht..." },
        fr: { eh: "ATTENDS !", ep: "147 filles t'attendent.", ebtn: "RESTER", mh: "Inscription", mp: "Inscris-toi pour voir les vidéos.", mbtn: "CONTINUER", names: ["Léa","Manon","Chloé"], chats: [["Salut ! Nouveau ? 😊"]], push: ["Regarde ça... 🔥"], fixBtn: "INSCRIPTION", ph: "Message..." },
        tr: { eh: "BEKLE!", ep: "147 kız seninle tanışmak istiyor.", ebtn: "KAL", mh: "Kayıt", mp: "Videoları izlemek için kayıt olun.", mbtn: "DEVAM ET", names: ["Elif","Zeynep","Ece"], chats: [["Selam! Yeni misin? 😊"]], push: ["Şuna bak... 🔥"], fixBtn: "HIZLI KAYIT", ph: "Mesaj..." }
    };

    const smartlink = "https://tone.affomelody.com/tHHtXh";
    let userLang = navigator.language.split('-')[0];
    if (userLang === 'ua') userLang = 'uk';
    const cur = languages[userLang] || languages.en;
    let isChat = false;

    // UI Init
    document.getElementById('eh').innerText = cur.eh; document.getElementById('ep').innerText = cur.ep; document.getElementById('ebtn').innerText = cur.ebtn;
    document.getElementById('mh').innerText = cur.mh; document.getElementById('mp').innerText = cur.mp; document.getElementById('mbtn').innerText = cur.mbtn;
    document.getElementById('fix-btn').innerText = cur.fixBtn; document.getElementById('input-placeholder').innerText = cur.ph;

    function buildList() {
        const container = document.getElementById('chats-container');
        cur.names.forEach((n, i) => {
            const row = document.createElement('div'); row.className = 'chat-row';
            row.innerHTML = `<div class="avatar-container"><img src="${i+2}.jpg" class="avatar"><div class="online-dot"></div></div><div class="info"><div style="display:flex; justify-content:space-between;"><span class="name">${n}</span><span class="time">${Math.floor(Math.random()*10)+1}m</span></div><div class="preview">${cur.chats[0][0]}</div></div>`;
            row.onclick = () => { isChat = true; history.pushState({v:'chat'}, ""); openChat(i); };
            container.appendChild(row);
        });
    }

    async function openChat(i) {
        document.getElementById('c-nm').innerText = cur.names[i];
        document.getElementById('c-av').src = `${i+2}.jpg`;
        const mBox = document.getElementById('m-box');
        const tUi = document.getElementById('typing-ui');
        mBox.querySelectorAll('.bubble').forEach(e => e.remove());
        document.getElementById('chat-screen').style.display = 'flex';

        // Перше повідомлення
        await wait(800);
        addB(cur.chats[0][0]);
        
        // Імітація друку перед капканом
        await wait(1500);
        tUi.style.display = 'block';
        mBox.scrollTop = 9999;
        
        // КАПКАН: Через 4 секунди показуємо реєстрацію
        setTimeout(showRegModal, 4000);
    }

    function addB(t) {
        const b = document.createElement('div'); b.className = 'bubble'; b.innerText = t;
        document.getElementById('m-box').appendChild(b); document.getElementById('m-box').scrollTop = 9999;
    }

    function handleBack() { history.back(); }
    function showRegModal() { document.getElementById('reg-modal').style.display = 'flex'; }
    function goLink() { window.location.href = smartlink; }
    const wait = ms => new Promise(res => setTimeout(res, ms));

    function initExitLogic() {
        for(let i=0; i<20; i++) { history.pushState({v:'list'}, ""); }
        window.onpopstate = function(event) {
            if (isChat) { document.getElementById('chat-screen').style.display = 'none'; isChat = false; } 
            else { document.getElementById('exit-pop').style.display = 'flex'; history.pushState({v:'list'}, ""); }
        };
    }

    function showPush() {
        const p = document.getElementById('push-note');
        document.getElementById('p-name').innerText = cur.names[Math.floor(Math.random()*cur.names.length)];
        document.getElementById('p-msg').innerText = cur.push[Math.floor(Math.random()*cur.push.length)];
        document.getElementById('p-img').src = "https://images.pexels.com/photos/1181686/pexels-photo-1181686.jpeg?auto=compress&cs=tinysrgb&w=150";
        p.classList.add('show'); setTimeout(() => p.classList.remove('show'), 5000);
    }

    setInterval(() => { if(!isChat) showPush(); }, 25000);
    setTimeout(showPush, 3000);
    buildList();
    initExitLogic();
</script>
</body>
</html>
