<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Знакомства</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: linear-gradient(135deg, #f02d66 0%, #ff6b35 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #fff;
            height: 100vh;
            overflow: hidden; /* Запрещаем скролл */
            display: flex;
            flex-direction: column;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            justify-content: space-between; /* Распределяем элементы по высоте */
        }

        /* Шапка */
        .header { text-align: center; padding-top: 10px; }
        
        .live-status {
            display: inline-flex;
            align-items: center;
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(74, 222, 128, 0.2);
            margin-bottom: 10px;
        }

        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 10px #4ade80; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        h1 { font-size: 22px; font-weight: 900; line-height: 1.1; margin-bottom: 5px; }
        span.danger { color: #f02d66; text-transform: uppercase; letter-spacing: 1px; }

        /* Слайдер с фото */
        .slider-container {
            position: relative;
            width: 100%;
            height: 45vh; /* Занимает почти половину экрана */
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active { opacity: 1; }

        .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        .girl-info { font-size: 18px; font-weight: 700; }

        /* Блок дожима */
        .info-block {
            background: var(--glass);
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Кнопка */
        .cta-container { padding-bottom: 10px; }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: var(--accent);
            height: 65px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            box-shadow: 0 15px 30px rgba(240, 45, 102, 0.3);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .footer-text { font-size: 11px; color: #475569; text-align: center; margin-top: 10px; }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <div class="live-status">
            <div class="dot"></div>
            <span id="live-count">147 женщин рядом</span>
        </div>
        <h1 id="main-title">Ищешь отношения или <span class="danger">С_E_К_C</span> без обязательств?</h1>
    </div>

    <div class="slider-container" id="slider">
        <!-- Слайды добавятся через JS -->
    </div>

    <div class="info-block">
        <p id="desc">Все девушки на фото сейчас онлайн в твоем городе. Без ботов и долгой переписки. Выбирай и встречайся.</p>
    </div>

    <div class="cta-container">
        <a href="ТВОЯ_СМАРТЛИНКА" class="cta-button" id="btn">ПЕРЕЙТИ К ОБЩЕНИЮ</a>
        <div class="footer-text">Нажимая кнопку, вы подтверждаете, что вам есть 18 лет</div>
    </div>
</div>

<script>
    const lang = navigator.language || navigator.userLanguage;
    const isUkr = lang.includes('uk') || lang.includes('UA');

    const content = {
        ru: {
            live: "147 женщин рядом",
            title: 'Ищешь отношения или <span class="danger">С_E_К_C</span> без обязательств?',
            desc: "Все девушки на фото сейчас онлайн в твоем городе. Без ботов и долгой переписки. Выбирай и встречайся.",
            btn: "ПЕРЕЙТИ К ОБЩЕНИЮ",
            names: ["Катя, 24", "Маша, 27", "Алина, 31", "Лена, 22", "Вика, 29", "Оля, 25"]
        },
        uk: {
            live: "147 жінок поруч",
            title: 'Шукаєш стосунки чи <span class="danger">С_E_К_C</span> без зобов’язань?',
            desc: "Усі дівчата на фото зараз онлайн у твоєму місті. Без ботів та довгих переписок. Обирай та зустрічайся.",
            btn: "ПЕРЕЙТИ ДО СПІЛКУВАННЯ",
            names: ["Катя, 24", "Маша, 27", "Аліна, 31", "Олена, 22", "Віка, 29", "Оля, 25"]
        }
    };

    const cur = isUkr ? content.uk : content.ru;

    // Применяем тексты
    document.getElementById('live-count').innerText = cur.live;
    document.getElementById('main-title').innerHTML = cur.title;
    document.getElementById('desc').innerText = cur.desc;
    document.getElementById('btn').innerText = cur.btn;

    // Слайдер
    const slider = document.getElementById('slider');
    const photos = [2, 3, 4, 5, 6, 7]; // твои фото
    
    photos.forEach((num, idx) => {
        const slide = document.createElement('div');
        slide.className = `slide ${idx === 0 ? 'active' : ''}`;
        slide.style.backgroundImage = `url('${num}.jpg')`;
        slide.innerHTML = `<div class="slide-overlay"><div class="girl-info">${cur.names[idx]}</div></div>`;
        slider.appendChild(slide);
    });

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');

    setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }, 3000); // Меняем фото каждые 3 секунды
</script>

</body>
</html>
