        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { width: 90%; max-width: 400px; text-align: center; }
        
        /* Loader */
        .loader { width: 60px; height: 60px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Main Card */
        .profile-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #333; display: none; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .blur-media { width: 100%; height: 180px; background: url('2.jpg') center; background-size: cover; border-radius: 15px; filter: blur(20px); margin-bottom: 20px; position: relative; border: 1px solid #444; }

        h2 { font-size: 20px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; line-height: 1.4; margin-bottom: 25px; }

        /* Exit Modal */
        #exit-pop { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .exit-card { background: var(--card); padding: 30px 20px; border-radius: 30px; text-align: center; border: 1px solid #444; width: 100%; max-width: 340px; }
        
        /* Avatar Grid in Exit Pop */
        .exit-avatars { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .exit-avatars img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .online-circle { position: relative; display: inline-block; }
        .online-circle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 12px; height: 12px; background: #4cd964; border-radius: 50%; border: 2px solid var(--card); }
