<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <style>
        :root { --primary: #fe2c55; --online: #4caf50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, Roboto, sans-serif; }
        body { background: #000; overflow: hidden; position: fixed; width: 100%; }
        .bg-layer { position: fixed; inset: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); z-index: 1; }
        #chat-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .chat-card { width: 92%; max-width: 380px; height: 85vh; background: #fff; border-radius: 25px; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        .header { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; background: #fff; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid var(--primary); }
        .u-name { font-weight: 700; font-size: 16px; color: #000; }
        .u-status { font-size: 11px; color: var(--online); font-weight: 800; }
        .msg-area { flex: 1; padding: 15px; overflow-y: auto; background: #f0f2f5; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; animation: pop 0.2s ease-out forwards; position: relative; }
        .received { background: #fff; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; padding-bottom: 20px; min-width: 80px; }
        .ticks { position: absolute; bottom: 4px; right: 10px; font-size: 9px; opacity: 0.8; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .input-zone { padding: 10px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .input-zone input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 14px; background: #f8f8f8; }
        .send-btn { background: var(--primary); color: #fff; border: none; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .lock-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: #fff; padding: 30px 20px; border-top: 3px solid var(--primary); transform: translateY(105%); transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1); z-index: 200; text-align: center; border-radius: 25px 25px 0 0; }
        .lock-overlay.active { transform: translateY(0); }
        .btn-reg { background: var(--primary); color: #fff; text-decoration: none; display: block; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 18px; box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3); }
        #exit-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: #fff; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 25px 0; width: 100%; max-width: 360px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; border: 1px solid #333; }
        .btn-exit-go { background: var(--primary); color: #fff; padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; font-size: 18px; }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<div id="chat-overlay">
    <div class="chat-card">
        <div class="header">
            <img src="1.jpg" class="avatar">
            <div><div class="u-name">Klubnicka69</div><div class="u-status" id="st-text">Online</div></div>
        </div>
        <div class="msg-area" id="box"><div class="bubble received" id="m0">...</div></div>
        <div id="ui-actions" class="input-zone">
            <input type="text" id="user-input" placeholder="...">
            <button class="send-btn" onclick="handleSend()"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
        <div class="lock-overlay" id="lock-block">
            <div style="font-weight:900; font-size:20px; margin-bottom:10px; color:#000;" id="lt">...</div>
            <div style="font-size:14px; color:#666; margin-bottom:25px;" id="ld">...</div>
            <a href="https://tone.affomelody.com/tHHtXh" class="btn-reg" id="lb">...</a>
        </div>
    </div>
</div>

<div id="exit-popup">
    <h2 id="et1">Wait! 💋</h2>
    <p id="et2" style="margin-top:10px; opacity:0.9; font-size:16px;">...</p>
    <div class="grid"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg"><img src="5.jpg"><img src="6.jpg"><img src="7.jpg"></div>
    <a href="https://tone.affomelody.com/tHHtXh" class="btn-exit-go" id="eb">...</a>
    <p style="margin-top: 40px; font-size: 14px; color: #888; text-decoration: underline; cursor: pointer;" onclick="location.href='https://google.com'" id="exit-back">Back</p>
</div>

<script>
    const trans = {
        ru: { on: "В сети", m0: "Привет! 😊 Ты тут?", ph: "Напиши ей...", m1: "Ого, ты быстро ответил! ☺️", m2: "Я уже хотела удалять анкету, но тут ты! 😊 Как зовут? Откуда ты? 🥲", lt: "Продолжить чат", ld: "Регистрация нужна, чтобы отправить ответ.", lb: "ОТВЕТИТЬ", et2: "Эти девушки сейчас онлайн рядом:", eb: "СМОТРЕТЬ ВСЕХ", read: "Прочитано", back: "Назад" },
        uk: { on: "В мережі", m0: "Привіт! 😊 Ти тут?", ph: "Напиши їй...", m1: "Ого, ти швидко відповів! ☺️", m2: "Я вже хотіла видаляти анкету, але тут ти! 😊 Як звати? Звідки ти? 🥲", lt: "Продовжити чат", ld: "Потрібна реєстрація, щоб відповісти.", lb: "ВІДПОВІСТИ", et2: "Ці дівчата онлайн поруч:", eb: "ДИВИТИСЬ УСІХ", read: "Прочитано", back: "Назад" },
        be: { on: "У сетцы", m0: "Прывітанне! 😊 Ты тут?", ph: "Напішы ёй...", m1: "Ого, ты хутка адказаў! ☺️", m2: "Я ўжо хацела выдаляць анкету! 😊 Як клічуць? Адкуль ты? 🥲", lt: "Працягнуць чат", ld: "Рэгістрацыя патрэбна для адказу.", lb: "АДКАЗАЦЬ", et2: "Гэтыя дзяўчаты зараз онлайн:", eb: "ГЛЯДЗЕЦЬ УСІХ", read: "Прачытана", back: "Назад" },
        kz: { on: "Желіде", m0: "Сәлем! 😊 Осындасың ба?", ph: "Оған жаз...", m1: "Ой, тез жауап бердің ғой! ☺️", m2: "Анкетмды өшірейін деп жатыр едім! 😊 Атың кім? Қайдансың? 🥲", lt: "Чатты жалғастыру", ld: "Жауап беру үшін тіркеліңіз.", lb: "ЖАУАП БЕРУ", et2: "Бұл қыздар қазір онлайн:", eb: "БАРЛЫҒЫН КӨРУ", read: "Оқылды", back: "Артқа" },
        pl: { on: "Online", m0: "Cześć! 😊 Jesteś?", ph: "Napisz do niej...", m1: "O, szybko odpisałeś! ☺️", m2: "Już miałam usunąć konto! 😊 Jak masz na imię? Skąd jesteś? 🥲", lt: "Kontynuuj czat", ld: "Zarejestruj się, aby wysłać wiadomość.", lb: "ODPOWIEDZ", et2: "Te dziewczyny są teraz online:", eb: "ZOBACZ WSZYSTKIE", read: "Przeczytano", back: "Wstecz" },
        de: { on: "Online", m0: "Hallo! 😊 Bist du da?", ph: "Schreib ihr...", m1: "Wow, schnelle Antwort! ☺️", m2: "Ich wollte gerade mein Profil löschen! 😊 Wie heißt du? Woher kommst du? 🥲", lt: "Weiter chatten", ld: "Registriere dich, um zu antworten.", lb: "ANTWORTEN", et2: "Diese Mädchen sind online:", eb: "ALLE ANZEIGEN", read: "Gelesen", back: "Zurück" },
        tr: { on: "Çevrimiçi", m0: "Selam! 😊 Orada mısın?", ph: "Ona yaz...", m1: "Vay, çok hızlısın! ☺️", m2: "Profilimi silmek üzereydim! 😊 Adın ne? Nerelisin? 🥲", lt: "Sohbete devam et", ld: "Cevap vermek için kayıt ol.", lb: "CEVAP VER", et2: "Bu kızlar şu an çevrimiçi:", eb: "HEPSİNİ GÖR", read: "Okundu", back: "Geri" },
        ro: { on: "Online", m0: "Bună! 😊 Ești aici?", ph: "Scrie-i...", m1: "Wow, ce repede ai răspuns! ☺️", m2: "Voiam să-mi șterg profilul! 😊 Cum te cheamă? De unde ești? 🥲", lt: "Continuă chatul", ld: "Înregistrează-te pentru a răspunde.", lb: "RĂSPUNDE", et2: "Fete online lângă tine:", eb: "VEZI TOATE", read: "Citit", back: "Înapoi" },
        lv: { on: "Tiešsaistē", m0: "Sveiki! 😊 Vai esi šeit?", ph: "Raksti viņai...", m1: "O, tu ātri atbildēji! ☺️", m2: "Es jau gribēju dzēst profilu! 😊 Kā tevi sauc? No kurienes esi? 🥲", lt: "Turpināt tērzēšanu", ld: "Reģistrējies, lai atbildētu.", lb: "ATBILDĒT", et2: "Šīs meitenes ir tiešsaistē:", eb: "SKATĪT VISAS", read: "Izlasīts", back: "Atpakaļ" },
        lt: { on: "Prisijungusi", m0: "Labas! 😊 Ar esi čia?", ph: "Rašyk jai...", m1: "O, greitai atsakei! ☺️", m2: "Jau norėjau trinti anketą! 😊 Kuo tu vardu? Iš kur esi? 🥲", lt: "Tęsti pokalbį", ld: "Užsiregistruok, kad atsakytum.", lb: "ATSAKYTI", et2: "Šios merginos prisijungusios:", eb: "ŽIŪRĖTI VISAS", read: "Perskaityta", back: "Atgal" },
        et: { on: "Sees", m0: "Tere! 😊 Kas sa oled siin?", ph: "Kirjuta talle...", m1: "Vau, sa vastasid kiiresti! ☺️", m2: "Tahtsin just konto kustutada! 😊 Mis su nimi on? Kust sa pärit oled? 🥲", lt: "Jätka vestlust", ld: "Vastamiseks registreeru.", lb: "VASTA", et2: "Need tüdrukud on online:", eb: "VAATA KÕIKI", read: "Loetud", back: "Tagasi" },
        es: { on: "En línea", m0: "¡Hola! 😊 ¿Estás?", ph: "Escríbele...", m1: "¡Vaya, qué rápido! ☺️", m2: "¡Estaba por borrar mi cuenta! 😊 ¿Cómo te llamas? ¿De dónde eres? 🥲", lt: "Continuar chat", ld: "Regístrate para responder.", lb: "RESPONDER", et2: "Chicas en línea cerca de ti:", eb: "VER TODAS", read: "Leído", back: "Atrás" },
        pt: { on: "Online", m0: "Olá! 😊 Está aí?", ph: "Escreva para ela...", m1: "Uau, você foi rápido! ☺️", m2: "Eu ia apagar meu perfil agora! 😊 Qual seu nome? De onde você é? 🥲", lt: "Continuar chat", ld: "Registe-se para responder.", lb: "RESPONDER", et2: "Garotas online perto de você:", eb: "VER TODAS", read: "Lido", back: "Voltar" },
        nl: { on: "Online", m0: "Hoi! 😊 Ben je er?", ph: "Schrijf haar...", m1: "Wauw, snelle reactie! ☺️", m2: "Ik wilde net mijn profiel wissen! 😊 Hoe heet je? Waar kom je vandaan? 🥲", lt: "Verder chatten", ld: "Registreer om te antwoorden.", lb: "ANTWOORDEN", et2: "Meisjes online in de buurt:", eb: "BEKIJK ALLES", read: "Gelezen", back: "Terug" },
        en: { on: "Online", m0: "Hi! 😊 Are you here?", ph: "Type message...", m1: "Wow, you replied fast! ☺️", m2: "I was about to delete my profile! 😊 What's your name? Where are you from? 🥲", lt: "Continue Chat", ld: "Register to send your message.", lb: "REPLY", et2: "Girls online near you:", eb: "SEE ALL", read: "Read", back: "Back" }
    };

    const getL = () => {
        const n = navigator.language.split('-')[0];
        // Группировка СНГ под RU, если нет своего перевода
        const ruGroup = ['ru','az','am','ka','tg','ky','uz'];
        if (trans[n]) return trans[n];
        if (ruGroup.includes(n)) return trans.ru;
        if (n === 'uk') return trans.uk;
        if (n === 'be') return trans.be;
        if (n === 'kk') return trans.kz;
        return trans.en;
    };
    const cur = getL();

    // Применяем тексты
    document.getElementById('st-text').innerText = cur.on;
    document.getElementById('m0').innerText = cur.m0;
    document.getElementById('user-input').placeholder = cur.ph;
    document.getElementById('lt').innerText = cur.lt;
    document.getElementById('ld').innerText = cur.ld;
    document.getElementById('lb').innerText = cur.lb;
    document.getElementById('et2').innerText = cur.et2;
    document.getElementById('eb').innerText = cur.eb;
    document.getElementById('exit-back').innerText = cur.back;

    let step = 0;

    function handleSend() {
        const inp = document.getElementById('user-input');
        const text = inp.value.trim();
        if(!text) return;
        
        inp.value = '';
        add(text, 'sent');
        
        if(step === 0) {
            step = 1;
            runSeq();
        } else {
            document.getElementById('lock-block').classList.add('active');
            document.getElementById('user-input').blur();
        }
    }

    async function runSeq() {
        await sleep(800);
        add(cur.m1, 'received');
        await sleep(1200);
        add(cur.m2, 'received');
        await sleep(500);
        document.getElementById('user-input').disabled = true;
    }

    function add(txt, type) {
        const b = document.getElementById('box');
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerText = txt;
        if(type === 'sent') d.innerHTML += `<span class="ticks">✓✓ ${cur.read}</span>`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Логика "Назад"
    history.pushState(null, null, location.href);
    window.onpopstate = () => { 
        document.getElementById('exit-popup').style.display = 'flex'; 
        history.pushState(null, null, location.href); 
    };

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') handleSend();
    });
</script>
</body>
</html>
