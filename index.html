<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Messenger</title>
    
    <style>
        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; --gray: #999; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }

        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid #333; z-index: 10; position: relative; }
        .header h1 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        
        #list-screen { height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .chat-row { display: flex; padding: 15px; border-bottom: 1px solid #222; align-items: center; cursor: pointer; }
        .avatar-box { position: relative; margin-right: 15px; }
        .avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; }
        .online { width: 14px; height: 14px; background: #32d74b; border: 2px solid var(--bg); border-radius: 50%; position: absolute; bottom: 4px; right: 4px; }
        .info { flex: 1; }
        .name { font-weight: 700; font-size: 17px; margin-bottom: 4px; display: block; }
        .preview { color: var(--gray); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .badge { background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: bold; float: right; }

        #chat-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; flex-direction: column; }
        .chat-head { background: var(--card); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .back { font-size: 30px; color: var(--accent); margin-right: 15px; cursor: pointer; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; align-self: flex-start; background: #262629; line-height: 1.4; }
        .input-bar { background: var(--card); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        .fake-in { flex: 1; background: #2c2c2e; padding: 12px 18px; border-radius: 25px; color: var(--gray); font-size: 14px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); width: 100%; max-width: 320px; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid #444; }
        .btn { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 16px; margin-top: 15px; box-shadow: 0 8px 15px rgba(255, 45, 85, 0.4); }
        .fixed-reg { position: fixed; bottom: 20px; width: 90%; left: 5%; z-index: 100; }
    </style>
</head>
<body>

<div class="header"><h1 id="t-h">MESSENGER</h1></div>
<div id="list-screen"></div>

<div id="chat-screen">
    <div class="chat-head">
        <div class="back" onclick="history.back()">‹</div>
        <img id="c-av" class="avatar" style="width:45px; height:45px; margin-right:12px;">
        <span class="name" id="c-nm">Name</span>
    </div>
    <div class="msg-box" id="m-box"></div>
    <div class="input-bar" onclick="openReg()"><div class="fake-in" id="t-in">...</div></div>
</div>

<div class="fixed-reg"><a href="https://tone.affomelody.com/tHHtXh" class="btn" id="t-btn">REGISTRATION</a></div>

<div id="exit-pop" class="modal">
    <div class="card">
        <h2 id="eh" style="color:var(--accent); margin-bottom:15px"></h2>
        <p id="ep" style="line-height:1.6"></p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn">I'M STAYING</a>
    </div>
</div>

<script>
    const config = {
        ru: {
            h: "ДЕВУШКИ ОНЛАЙН 🔥", in: "Напиши ответ...", btn: "РЕГИСТРАЦИЯ", eh: "УХОДИШЬ?", 
            ep: "Рядом 147 девушек хотят секса и 233 ищут отношений. Останься!",
            names: ["Мария", "Катя", "Вика", "Лена", "Света", "Анжела"],
            msgs: [["Привет! Ты новенький? 😊", "Добавь фото, хочу тебя увидеть..."], ["Приветик! Ты откуда?", "Вижу ты не регался еще, пообщаемся позже? 😉"], ["Ого, какой красавчик!", "Скинула бы фото, но заведи сначала профиль..."]]
        },
        ua: {
            h: "ДІВЧАТА ОНЛАЙН 🔥", in: "Напиши відповідь...", btn: "РЕЄСТРАЦІЯ", eh: "ЙДЕШ?", 
            ep: "Поруч 147 дівчат хочуть сексу та 233 шукають кохання. Залишайся!",
            names: ["Оксана", "Юля", "Настя", "Ірина", "Марина", "Олена"],
            msgs: [["Привіт! Ти новенький? 😊", "Додай фото, хочу тебе побачити..."], ["Привіт! Ти звідки?", "Бачу ти ще не в системі, поспілкуємось? 😉"], ["Ого, який красень!", "Скинула б фото, але спочатку зроби профіль..."]]
        },
        es: {
            h: "CHICAS EN LÍNEA 🔥", in: "Escribe algo...", btn: "REGISTRO", eh: "¿TE VAS?", 
            ep: "147 chicas cerca quieren sexo y 233 buscan amor. ¡Quédate!",
            names: ["Lucía", "Martina", "Sofía", "Valeria", "Alba", "Julia"],
            msgs: [["¡Hola! ¿Eres nuevo? 😊", "Sube tu foto, quiero verte bien..."], ["¡Buenas! ¿De dónde eres?", "¿Aún sin registro? ¡Hablemos luego! 😉"], ["¡Vaya, qué guapo!", "Te enviaría fotos, pero necesitas un perfil..."]]
        },
        de: {
            h: "FRAUEN ONLINE 🔥", in: "Schreib etwas...", btn: "REGISTRIERUNG", eh: "WARTE!", 
            ep: "147 Frauen wollen Sex und 233 suchen Liebe. Bleib hier!",
            names: ["Hanna", "Leni", "Mia", "Emma", "Lara", "Sofia"],
            msgs: [["Hallo! Neu hier? 😊", "Lad ein Foto hoch, ich will dich sehen..."], ["Hey! Woher kommst du?", "Noch nicht registriert? Schreib mir später! 😉"], ["Wow, hübscher Kerl!", "Ich schick dir Fotos, wenn du ein Profil hast..."]]
        },
        pl: {
            h: "DZIEWCZYNY ONLINE 🔥", in: "Napisz wiadomość...", btn: "REJESTRACJA", eh: "CZEKAJ!", 
            ep: "147 dziewczyn chce seksu, a 233 szuka miłości. Zostań z nami!",
            names: ["Zuzanna", "Julia", "Maja", "Zofia", "Lena", "Amelia"],
            msgs: [["Cześć! Nowy tutaj? 😊", "Dodaj zdjęcie, chcę Cię zobaczyć..."], ["Hej! Skąd jesteś?", "Nie masz profilu? Pogadamy jak się zarejestrujesz! 😉"], ["Ojej, przystojniak!", "Wysłałabym fotkę, ale zrób najpierw profil..."]]
        },
        en: {
            h: "GIRLS ONLINE 🔥", in: "Type a reply...", btn: "REGISTRATION", eh: "WAIT!", 
            ep: "147 girls want sex and 233 seek love near you. Don't go!",
            names: ["Emily", "Chloe", "Megan", "Jessica", "Lily", "Sarah"],
            msgs: [["Hi! New here? 😊", "Add your photo, I want to see you..."], ["Hey! Where are you from?", "Not registered yet? Let's chat later! 😉"], ["Wow, handsome guy!", "I'd send a photo, but you need a profile first..."]]
        }
    };

    // МАППИНГ 30+ СТРАН
    const langMap = {
        'ru': ['ru', 'kz', 'be', 'uz', 'az', 'am', 'tj', 'tm', 'kg', 'md'],
        'ua': ['uk'],
        'es': ['es', 'mx', 'ar', 'co', 'cl', 'pe', 've', 'py', 'uy', 'bo', 'ec', 'pa', 'cr', 'do'],
        'de': ['de', 'at', 'ch'],
        'pl': ['pl'],
        'en': ['en', 'us', 'gb', 'ca', 'au', 'fr', 'it', 'lt', 'lv', 'et', 'be', 'nl', 'no', 'se', 'fi', 'dk']
    };

    let userLang = 'en';
    const navLang = navigator.language.split('-')[0];
    for (let l in langMap) { if (langMap[l].includes(navLang)) userLang = l; }
    const cur = config[userLang] || config.en;
    let isChat = false;

    document.getElementById('t-h').innerText = cur.h;
    document.getElementById('t-in').innerText = cur.in;
    document.getElementById('t-btn').innerText = cur.btn;
    document.getElementById('eh').innerText = cur.eh;
    document.getElementById('ep').innerHTML = cur.ep;

    function buildList() {
        const list = document.getElementById('list-screen');
        cur.names.forEach((name, i) => {
            const row = document.createElement('div');
            row.className = 'chat-row';
            const mText = cur.msgs[i] ? cur.msgs[i][0] : cur.msgs[0][0];
            row.innerHTML = `<div class="avatar-box"><img src="${i+2}.jpg" class="avatar"><div class="online"></div></div>
                <div class="info"><span class="name">${name}</span><div class="preview">${mText}</div></div>
                <div class="badge">1</div>`;
            row.onclick = () => { isChat = true; history.pushState({v:'c'},""); openChat(i); };
            list.appendChild(row);
        });
    }

    function openChat(i) {
        const d = cur.msgs[i] || cur.msgs[0];
        document.getElementById('c-nm').innerText = cur.names[i];
        document.getElementById('c-av').src = `${i+2}.jpg`;
        document.getElementById('m-box').innerHTML = '';
        document.getElementById('chat-screen').style.display = 'flex';
        setTimeout(() => addM(d[0]), 400);
        setTimeout(() => addM(d[1]), 2200);
    }

    function addM(t) {
        const b = document.createElement('div'); b.className = 'bubble'; b.innerText = t;
        document.getElementById('m-box').appendChild(b);
        document.getElementById('m-box').scrollTop = 9999;
    }

    function openReg() { window.location.href = "https://tone.affomelody.com/tHHtXh"; }

    history.replaceState({v:'l'}, "");
    window.onpopstate = function() {
        if (isChat) {
            document.getElementById('chat-screen').style.display = 'none';
            isChat = false;
        } else {
            document.getElementById('exit-pop').style.display = 'flex';
        }
    };

    buildList();
</script>
</body>
</html>
