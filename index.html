<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat | Klubnicka69</title>
    <style>
        :root { --primary: #fe2c55; --online: #4caf50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, Roboto, sans-serif; }
        body { background: #000; overflow: hidden; position: fixed; width: 100%; }
        
        /* Абстрактный прикольный фон */
        .bg-layer { position: fixed; inset: 0; background: linear-gradient(45deg, #1a1a1a, #4a148c); z-index: 1; }
        
        #chat-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .chat-card { width: 92%; max-width: 380px; height: 85vh; background: #fff; border-radius: 25px; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        
        .header { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; background: #fff; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 2px solid var(--primary); }
        .u-name { font-weight: 700; font-size: 16px; }
        .u-status { font-size: 11px; color: var(--online); font-weight: bold; }

        .msg-area { flex: 1; padding: 15px; overflow-y: auto; background: #f7f8fa; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; animation: pop 0.2s ease-out forwards; }
        .received { background: #fff; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .sent { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .action-zone { padding: 15px; background: #fff; border-top: 1px solid #eee; text-align: center; }
        .btn-reply { background: #f1f1f2; border: none; padding: 10px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; margin: 4px; transition: 0.2s; }
        .btn-reply:active { background: #e2e2e4; }

        /* Lock / Reg block */
        .lock-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: #fff; padding: 25px 20px; border-top: 2px solid var(--primary); transform: translateY(105%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 200; text-align: center; }
        .lock-overlay.active { transform: translateY(0); }
        .btn-reg { background: var(--primary); color: #fff; text-decoration: none; display: block; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 18px; box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3); }

        /* EXIT POPUP */
        #exit-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: #fff; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; width: 100%; max-width: 400px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid #333; }
        .btn-exit-go { background: var(--primary); color: #fff; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div id="chat-overlay">
    <div class="chat-card">
        <div class="header">
            <img src="1.jpg" class="avatar">
            <div>
                <div class="u-name">Klubnicka69</div>
                <div class="u-status">Online</div>
            </div>
        </div>
        <div class="msg-area" id="box">
            <div class="bubble received" id="first-msg">...</div>
        </div>
        <div class="action-zone" id="ui-actions">
            <div class="quick-replies" id="replies-container"></div>
        </div>
        <div class="lock-overlay" id="lock-block">
            <div style="font-weight:900; font-size:20px; margin-bottom:10px;" id="lt">Continue Chat</div>
            <div style="font-size:14px; color:#666; margin-bottom:20px;" id="ld">Register to reply...</div>
            <a href="https://tone.affomelody.com/tHHtXh" class="btn-reg" id="lb">REPLY</a>
        </div>
    </div>
</div>

<div id="exit-popup">
    <h2 id="et1">Don't leave yet!</h2>
    <p id="et2" style="margin-top:10px; opacity:0.8;">These girls are online near you:</p>
    <div class="grid">
        <img src="2.jpg"> <img src="3.jpg"> <img src="4.jpg">
        <img src="5.jpg"> <img src="6.jpg"> <img src="7.jpg">
    </div>
    <a href="https://tone.affomelody.com/tHHtXh" class="btn-exit-go" id="eb">SEE ALL PROFILES</a>
    <p style="margin-top: 20px; font-size: 12px; color: #666;" onclick="location.reload()">Return to chat</p>
</div>

<script>
    const translations = {
        ru: { m0: "Привет! 😊", r: ["Привет! 👋", "Познакомимся? 😊"], m1: "Ты первый, кто написал мне за месяц... ☺️", m2: "Я уже хотела удалять анкету, но тут ты! Как зовут? Откуда ты? 🥲", lt: "Продолжить чат", ld: "Регистрация нужна, чтобы Klubnicka69 увидела твой ответ.", lb: "ОТВЕТИТЬ ЕЙ", et1: "Уже уходишь?", et2: "Эти девушки сейчас в поиске:", eb: "СМОТРЕТЬ ВСЕХ" },
        en: { m0: "Hi! 😊", r: ["Hey! 👋", "Let's chat! 😊"], m1: "You're the first one who wrote to me... ☺️", m2: "I was about to delete my profile! What's your name? Where are you from? 🥲", lt: "Continue Chat", ld: "Quick registration needed to reply to her.", lb: "REPLY TO HER", et1: "Wait!", et2: "These girls are active now:", eb: "SEE ALL" }
    };

    const L = translations[navigator.language.split('-')[0]] || translations.en;

    // Инициализация
    document.getElementById('first-msg').innerText = L.m0;
    document.getElementById('lt').innerText = L.lt;
    document.getElementById('ld').innerText = L.ld;
    document.getElementById('lb').innerText = L.lb;
    document.getElementById('et1').innerText = L.et1;
    document.getElementById('et2').innerText = L.et2;
    document.getElementById('eb').innerText = L.eb;

    const cont = document.getElementById('replies-container');
    L.r.forEach(t => {
        const b = document.createElement('button');
        b.className = 'btn-reply'; b.innerText = t;
        b.onclick = () => send(t);
        cont.appendChild(b);
    });

    function addMsg(txt, type) {
        const b = document.getElementById('box');
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerText = txt;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    async function send(t) {
        document.getElementById('ui-actions').style.display = 'none';
        addMsg(t, 'sent');
        
        // Быстрая серия сообщений без длинных пауз
        await sleep(600);
        addMsg(L.m1, 'received');
        await sleep(800);
        addMsg(L.m2, 'received');
        await sleep(400);
        document.getElementById('lock-block').classList.add('active');
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Трап на кнопку "Назад"
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
        document.getElementById('exit-popup').style.display = 'flex';
        history.pushState(null, null, location.href);
    };
</script>

</body>
</html>
