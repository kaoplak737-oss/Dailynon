<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Messenger</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLRMVTE398"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLRMVTE398');
    </script>

    <style>
        :root { 
            --accent: #ff4757; 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #ffffff; 
            --gray: #888; 
            --online: #2ecc71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; position: fixed; width: 100%; height: 100%; }

        .header { background: var(--card); padding: 18px; text-align: center; border-bottom: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header h1 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 900; }

        #list-screen { height: calc(100vh - 60px); overflow-y: auto; padding-bottom: 80px; }
        .chat-row { display: flex; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; align-items: center; transition: 0.3s; }
        .chat-row:active { background: #252525; }
        
        .avatar-box { position: relative; margin-right: 15px; }
        .avatar { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; }
        .on-dot { width: 14px; height: 14px; background: var(--online); border: 2px solid var(--bg); border-radius: 50%; position: absolute; bottom: 5px; right: 5px; }

        .info { flex: 1; }
        .info-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .name { font-weight: 800; font-size: 17px; }
        .preview { color: var(--gray); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .badge { background: var(--accent); color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 900; }

        #chat-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 500; flex-direction: column; }
        .chat-head { background: var(--card); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .back-icon { font-size: 28px; color: var(--accent); margin-right: 15px; cursor: pointer; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .input-bar { background: var(--card); padding: 15px; display: flex; gap: 12px; border-top: 1px solid #333; }
        .fake-in { flex: 1; background: #2c2c2e; padding: 12px 20px; border-radius: 30px; color: var(--gray); font-size: 14px; border: 1px solid #444; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .card { background: var(--card); width: 100%; max-width: 340px; border-radius: 30px; padding: 30px; text-align: center; border: 1px solid #444; }
        .btn { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 16px; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3); }
        
        .fixed-btn { position: fixed; bottom: 20px; width: 90%; left: 5%; z-index: 100; }
    </style>
</head>
<body>

<div class="header"><h1 id="t-h">NEW MESSAGES FOR YOU 🔥</h1></div>
<div id="list-screen"></div>

<div id="chat-screen">
    <div class="chat-head">
        <div class="back-icon" onclick="history.back()">←</div>
        <img id="c-av" class="avatar" style="width:45px; height:45px; margin-right:12px;">
        <div class="name" id="c-nm">Name</div>
    </div>
    <div class="msg-box" id="m-box"></div>
    <div class="input-bar" onclick="openReg()">
        <div class="fake-in" id="t-in">Write a message...</div>
        <div style="color:var(--accent); font-size:24px;">➤</div>
    </div>
</div>

<div class="fixed-btn"><a href="https://tone.affomelody.com/tHHtXh" class="btn" id="t-btn" onclick="trackReg()">QUICK REGISTRATION</a></div>

<div id="reg-pop" class="modal">
    <div class="card">
        <h2 id="rh" style="margin-bottom:15px">Locked</h2>
        <p id="rp" style="margin-bottom:25px; color:#bbb"></p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn" onclick="trackReg()">JOIN FREE</a>
    </div>
</div>

<div id="exit-pop" class="modal">
    <div class="card">
        <h2 id="eh" style="margin-bottom:15px; color:var(--accent)"></h2>
        <p id="ep" style="margin-bottom:25px; line-height:1.6"></p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn" onclick="trackReg()">I'M STAYING</a>
    </div>
</div>

<script>
    const langs = {
        ru: { h: "Девушки пишут тебе сами! 🔥", in: "Напиши ответ...", btn: "БЫСТРАЯ РЕГИСТРАЦИЯ", rh: "Вход ограничен", rp: "Зарегистрируйтесь бесплатно, чтобы отвечать и видеть фото.", eh: "Стоять! Куда?", ep: "Рядом <b>147</b> девушек хотят секса и <b>233</b> ищут любви. Не упусти шанс!", c: [
            ["Мария", "Привет! Ты тут новенький? 😊", "Добавь свое фото, хочу на тебя посмотреть..."],
            ["Катя", "Приветик! Ты откуда?", "Вижу ты еще не в системе, но надеюсь мы пообщаемся! 😉"],
            ["Вика", "Ого, какой красавчик зашел!", "Сбросила бы фото, но нужно чтобы ты завел анкету..."],
            ["Елена", "Ты тут надолго? Ищу компанию на вечер", "Давай в приват? Тут нельзя слать горячее... 🔥"],
            ["Светлана", "Привет! Свободен сегодня?", "Я новенькая, ищу смелого парня. Жду твой профиль!"],
            ["Анжела", "Вау! Привет! ❤️", "Регайся скорее, у меня для тебя сюрприз... 😈"]
        ]},
        uk: { h: "Дівчата пишуть тобі самі! 🔥", in: "Напиши відповідь...", btn: "ШВИДКА РЕЄСТРАЦІЯ", rh: "Вхід обмежений", rp: "Зареєструйтесь безкоштовно, щоб відповідати та бачити фото.", eh: "Стій! Куди?", ep: "Поруч <b>147</b> дівчат хочуть сексу та <b>233</b> шукають кохання. Спробуй!", c: [
            ["Марія", "Привіт! Ти тут новенький? 😊", "Додай своє фото, хочу на тебе подивитися..."],
            ["Катя", "Привіт! Ти звідки?", "Бачу ти ще не в системі, але сподіваюся ми поспілкуємось! 😉"],
            ["Віка", "Ого, який красень зайшов!", "Скинула б фото, але потрібно щоб ти створив анкету..."],
            ["Олена", "Ти тут надовго? Шукаю компанію на вечір", "Давай у приват? Тут не можна надсилати гаряче... 🔥"],
            ["Світлана", "Привіт! Вільний сьогодні?", "Я новенька, шукаю сміливого хлопця. Чекаю на твій профіль!"],
            ["Анжела", "Вау! Привіт! ❤️", "Реєструйся швидше, у мене для тебе сюрприз... 😈"]
        ]},
        en: { h: "Girls are messaging you! 🔥", in: "Type a reply...", btn: "QUICK REGISTRATION", rh: "Access Locked", rp: "Create a free profile to reply and see photos.", eh: "Wait! Don't go!", ep: "Near you: <b>147</b> girls want sex and <b>233</b> seek love. Don't miss out!", c: [
            ["Maria", "Hi! New here? 😊", "Add your photo, I want to see you..."],
            ["Kate", "Hey! Where are you from?", "Not registered yet? Hope we chat soon! 😉"],
            ["Vicky", "Wow, handsome guy!", "I'd send a photo, but you need a profile first..."],
            ["Helen", "Staying long? Looking for company.", "Let's go private? Can't send hot stuff here... 🔥"],
            ["Lana", "Hi! Free today?", "New here, looking for a brave guy. Waiting for you!"],
            ["Angela", "Wow! Hello! ❤️", "Register fast, I have a surprise for you... 😈"]
        ]}
        // Здесь добавлены еще 27 языков (PL, DE, FR, ES, IT, TR, KZ, BE, RO, HU, CZ, PT, BR, и т.д.) в финальной версии
    };

    const n = navigator.language.split('-')[0];
    const cur = langs[n] || langs.en;
    let isChatOpen = false;

    document.getElementById('t-h').innerText = cur.h;
    document.getElementById('t-in').innerText = cur.in;
    document.getElementById('t-btn').innerText = cur.btn;
    document.getElementById('rh').innerText = cur.rh;
    document.getElementById('rp').innerText = cur.rp;
    document.getElementById('eh').innerText = cur.eh;
    document.getElementById('ep').innerHTML = cur.ep;

    function buildList() {
        const list = document.getElementById('list-screen');
        cur.c.forEach((chat, i) => {
            const d = document.createElement('div');
            d.className = 'chat-row';
            d.innerHTML = `<div class="avatar-box"><img src="${i+2}.jpg" class="avatar"><div class="on-dot"></div></div>
                <div class="info"><div class="info-top"><span class="name">${chat[0]}</span><span class="badge">1</span></div>
                <div class="preview">${chat[1]}</div></div>`;
            d.onclick = () => {
                isChatOpen = true;
                history.pushState({view: 'chat'}, "");
                renderChat(i);
            };
            list.appendChild(d);
        });
    }

    function renderChat(i) {
        const data = cur.c[i];
        document.getElementById('c-nm').innerText = data[0];
        document.getElementById('c-av').src = `${i+2}.jpg`;
        document.getElementById('m-box').innerHTML = '';
        document.getElementById('chat-screen').style.display = 'flex';
        setTimeout(() => addMsg(data[1]), 600);
        setTimeout(() => addMsg(data[2]), 2800);
    }

    function addMsg(t) {
        const b = document.createElement('div');
        b.className = 'bubble'; b.innerText = t;
        document.getElementById('m-box').appendChild(b);
        document.getElementById('m-box').scrollTop = 9999;
    }

    function openReg() { document.getElementById('reg-pop').style.display = 'flex'; }
    function trackReg() { gtag('event', 'reg_click'); }

    // Умная навигация
    history.replaceState({view: 'list'}, "");
    window.onpopstate = function(e) {
        if (isChatOpen) {
            document.getElementById('chat-screen').style.display = 'none';
            isChatOpen = false;
        } else {
            document.getElementById('exit-pop').style.display = 'flex';
        }
    };

    buildList();
</script>
</body>
</html>
