<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: #17212b;
            --tg-accent: #5288c1;
            --tg-text: #f5f5f5;
            --tg-hint: #708499;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #0e1621;
            color: var(--tg-text);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: var(--tg-bg);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }
        .header-avatar { width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; background: url('2.jpg') center/cover; }
        .header-info h4 { font-size: 15px; font-weight: 700; }
        .header-info p { font-size: 12px; color: var(--tg-accent); }

        .photo-strip {
            display: flex;
            overflow-x: auto;
            padding: 10px 5px;
            gap: 6px;
            scrollbar-width: none;
        }
        .photo-strip::-webkit-scrollbar { display: none; }
        .photo-card {
            min-width: 110px;
            height: 150px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message-content {
            flex: 1;
            padding: 10px 15px;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .bubble {
            background: var(--tg-bg);
            padding: 12px;
            border-radius: 12px;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border-bottom-left-radius: 4px;
        }

        .bubble h2 { font-size: 14px; margin-bottom: 8px; color: #ffab2e; text-transform: uppercase; }
        .bubble ul { list-style: none; margin-bottom: 10px; }
        .bubble ul li { margin-bottom: 6px; font-size: 14px; display: flex; align-items: center; }
        .bubble ul li::before { content: '✔'; margin-right: 8px; color: var(--tg-accent); font-size: 12px; }

        .typing { font-size: 12px; color: var(--tg-hint); margin-top: 8px; font-style: italic; }

        /* Та самая ПОДНЯТАЯ КНОПКА */
        .cta-fixed {
            position: absolute;
            bottom: 40px; /* Поднята выше */
            left: 20px;
            right: 20px;
            z-index: 20;
        }

        .btn-main {
            display: block;
            width: 100%;
            background: var(--tg-accent);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 10px rgba(82, 136, 193, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 8px 25px rgba(82, 136, 193, 0.6); }
            100% { transform: scale(1); box-shadow: 0 4px 10px rgba(82, 136, 193, 0.4); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-avatar"></div>
        <div class="header-info">
            <h4 id="h-title">Dating Service</h4>
            <p id="h-status">2,415 online</p>
        </div>
    </div>

    <div class="photo-strip" id="slider"></div>

    <div class="message-content">
        <div class="bubble">
            <h2 id="b-head">SINGLE WOMEN ARE LOOKING FOR:</h2>
            <ul id="b-list"></ul>
            <p id="b-promo" style="font-weight: 500; font-size: 13px;"></p>
            <div class="typing" id="typing-text">...</div>
        </div>
    </div>

    <div class="cta-fixed">
        <a href="ТВОЯ_СМАРТЛИНКА" class="btn-main" id="btn">ENTER SITE</a>
    </div>
</div>

<script>
    const offerLink = "ТВОЯ_СМАРТЛИНКА";

    const translations = {
        ru: { hT: "Знакомства с женщинами", hS: "2,415 онлайн", bH: "ЗДЕСЬ ЖЕНЩИНЫ ИЩУТ:", li: ["Серьезных отношений", "Пикантного общения 🍓", "Встреч без обязательств 👉👌"], pr: "ПРОЙДИ РЕГИСТРАЦИЮ И ОНИ НАПИШУТ ТЕБЕ 😎", btn: "ПЕРЕЙТИ НА САЙТ", typ: "Катя печатает..." },
        uk: { hT: "Знайомства з жінками", hS: "2,415 онлайн", bH: "ТУТ ЖІНКИ ШУКАЮТЬ:", li: ["Серйозних стосунків", "Пікантного спілкування 🍓", "Зустрічей без зобов'язань 👉👌"], pr: "ПРОЙДИ РЕЄСТРАЦІЮ І ВОНИ НАПИШУТЬ ТОБІ 😎", btn: "ПЕРЕЙТИ НА САЙТ", typ: "Катя друкує..." },
        kz: { hT: "Әйелдермен танысу", hS: "2,415 онлайн", bH: "МҰНДА ӘЙЕЛДЕР ІЗДЕЙДІ:", li: ["Жидді қарым-қатынас", "Пикантты әңгіме 🍓", "Міндеттемесіз кездесулер 👉👌"], pr: "ТІРКЕЛІҢІЗ, ОЛАР СІЗГЕ ЖАЗАДЫ 😎", btn: "САЙТҚА ӨТУ", typ: "Катя жазып жатыр..." },
        pl: { hT: "Randki z kobietami", hS: "2,415 online", bH: "TUTAJ KOBIETY SZUKAJĄ:", li: ["Poważnych relacji", "Pikantnych rozmów 🍓", "Spotkań bez zobowiązań 👉👌"], pr: "ZAREJESTRUJ SIĘ, A ONE NAPISZĄ 😎", btn: "WEJDŹ NA STRONĘ", typ: "Kasia pisze..." },
        de: { hT: "Dating mit Frauen", hS: "2,415 online", bH: "HIER SUCHEN FRAUEN:", li: ["Ernste Beziehungen", "Pikante Chats 🍓", "Treffen ohne Verpflichtung 👉👌"], pr: "REGISTRIEREN SIE SICH JETZT 😎", btn: "ZUR WEBSEITE", typ: "Katja schreibt..." },
        es: { hT: "Citas con mujeres", hS: "2,415 en línea", bH: "AQUÍ LAS MUJERES BUSCAN:", li: ["Relaciones serias", "Charlas picantes 🍓", "Encuentros sin compromiso 👉👌"], pr: "REGÍSTRATE Y TE ESCRIBIRÁN 😎", btn: "ENTRAR AL SITIO", typ: "Elena está escribiendo..." },
        it: { hT: "Incontri con donne", hS: "2,415 online", bH: "QUI LE DONNE CERCANO:", li: ["Relazioni serie", "Chat piccanti 🍓", "Incontri senza impegno 👉👌"], pr: "REGISTRATI E TI SCRIVERANNO 😎", btn: "ENTRA NEL SITO", typ: "Giulia sta scrivendo..." },
        ro: { hT: "Întâlniri cu femei", hS: "2,415 online", bH: "AICI FEMEILE CAUTĂ:", li: ["Relații serioase", "Chat-uri picante 🍓", "Întâlniri fără obligații 👉👌"], pr: "ÎNREGISTREAZĂ-TE ȘI ÎȚI VOR SCRIE 😎", btn: "ACCESEAZĂ SITE-UL", typ: "Alina scrie..." },
        md: { hT: "Întâlniri cu femei", hS: "2,415 online", bH: "AICI FEMEILE CAUTĂ:", li: ["Relații serioase", "Chat-uri picante 🍓", "Întâlniri fără obligații 👉👌"], pr: "ÎNREGISTREAZĂ-TE ȘI ÎȚI VOR SCRIE 😎", btn: "ACCESEAZĂ SITE-UL", typ: "Alina scrie..." },
        fr: { hT: "Rencontres femmes", hS: "2,415 en ligne", bH: "ICI LES FEMMES CHERCHENT:", li: ["Relations sérieuses", "Discussions coquines 🍓", "Rencontres sans lendemain 👉👌"], pr: "INSCRIVEZ-VOUS ET ELLES ÉCRIRONT 😎", btn: "ACCÉDER AU SITE", typ: "Julie écrit..." },
        en: { hT: "Dating with women", hS: "2,415 online", bH: "SINGLE WOMEN ARE LOOKING FOR:", li: ["Serious relationships", "Spicy chats 🍓", "Casual hookups 👉👌"], pr: "REGISTER AND THEY WILL WRITE YOU 😎", btn: "ENTER SITE", typ: "Kate is typing..." }
    };

    // Определение языка
    const userLang = navigator.language.split('-')[0];
    const t = translations[userLang] || translations['en'];

    // Применяем тексты
    document.getElementById('h-title').innerText = t.hT;
    document.getElementById('h-status').innerText = t.hS;
    document.getElementById('b-head').innerText = t.bH;
    document.getElementById('b-promo').innerText = t.pr;
    document.getElementById('btn').innerText = t.btn;
    document.getElementById('btn').href = offerLink;
    document.getElementById('typing-text').innerText = t.typ;
    document.getElementById('b-list').innerHTML = t.li.map(i => `<li>${i}</li>`).join('');

    // Слайдер (10 фото)
    const slider = document.getElementById('slider');
    for(let i=1; i<=10; i++) {
        const div = document.createElement('div');
        div.className = 'photo-card';
        div.style.backgroundImage = `url('${i}.jpg')`;
        slider.appendChild(div);
    }

    // Авто-скролл
    let pos = 0;
    setInterval(() => {
        pos += 120;
        if (pos > slider.scrollWidth - slider.clientWidth) pos = 0;
        slider.scrollTo({ left: pos, behavior: 'smooth' });
    }, 3000);
</script>
</body>
</html>
