<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="./assets/css/config.css">
  <link rel="stylesheet" href="./assets/css/reset.css">  
  <link rel="stylesheet" href="./assets/css/style.css">
  <title>TikDate</title>
  <style>
    /* Стили чата */
    #chat-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        z-index: 10000;
        display: none;
        align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .chat-window {
        width: 92%; max-width: 360px; 
        max-height: 85vh; /* Фикс: окно не вылазит за экран */
        background: #fff; border-radius: 20px; 
        display: flex; flex-direction: column; 
        overflow: hidden; position: relative;
        box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    }
    .chat-header {
        padding: 12px 15px; border-bottom: 1px solid #f0f0f0;
        display: flex; align-items: center; background: #fff;
    }
    .chat-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
    .chat-name { font-weight: 700; font-size: 15px; color: #161823; margin-bottom: 2px; }
    .chat-status { font-size: 12px; color: #4caf50; display: flex; align-items: center; }
    .chat-status::before { content: ""; width: 7px; height: 7px; background: #4caf50; border-radius: 50%; margin-right: 5px; }

    .chat-messages { 
        flex: 1; padding: 15px; overflow-y: auto; 
        background: #f8f8f8; display: flex; flex-direction: column;
    }
    .msg { 
        background: #fff; padding: 10px 14px; border-radius: 16px; border-bottom-left-radius: 4px;
        margin-bottom: 12px; max-width: 85%; font-size: 14px; line-height: 1.4;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05); align-self: flex-start;
    }
    .typing-indicator { font-size: 12px; color: #fe2c55; font-weight: 500; margin-bottom: 10px; display: none; }

    /* Исправленная плашка блокировки */
    .lock-block {
        background: #fff; border-top: 1px solid #eee;
        padding: 15px; text-align: center;
        display: none; flex-direction: column; align-items: center;
    }
    .lock-icon { width: 35px; margin-bottom: 8px; }
    .lock-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; color: #161823; }
    .lock-text { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.3; padding: 0 10px; }
    
    .verify-btn { 
        background: #fe2c55; color: #fff; width: 100%; 
        padding: 14px; text-decoration: none; border-radius: 10px; 
        font-weight: 700; font-size: 15px; display: block;
        box-shadow: 0 4px 10px rgba(254, 44, 85, 0.2);
    }
  </style>
</head>
<body class="overlay">

  <div class="preloader active" id="preloader">
    <div class="preloader__wrapper">
      <img src="./assets/images/preloader/emoji.png" alt="Emoji" class="emoji">
      <img src="./assets/images/preloader/heart.png" alt="Heart" class="heart heart-1">
      <img src="./assets/images/preloader/heart.png" alt="Heart" class="heart heart-2">
      <p class="preloader__text">Поиск профиля . . .</p>
    </div>
  </div>

  <header class="header">
    <div class="logo">TikDate</div>
    <ul class="menu"><li>Folowing</li><li class="active">For you</li></ul>
  </header>

  <main class="main">
    <div class="video">
      <video class="video" src="./assets/files/video.mp4" loop playsinline autoplay muted></video>
    </div>
  </main>

  <div id="chat-overlay">
    <div class="chat-window">
        <div class="chat-header">
            <img src="./assets/images/girl.png" alt="" class="chat-avatar">
            <div>
                <div class="chat-name">Мария</div>
                <div class="chat-status">В сети</div>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div id="typing" class="typing-indicator">Мария печатает...</div>
        </div>

        <div id="lock-container" class="lock-block">
            <img src="https://img.icons8.com/fluency/48/000000/lock.png" class="lock-icon">
            <div class="lock-title">Чат ограничен</div>
            <div class="lock-text">Чтобы ответить Марии, подтвердите, что вы реальный человек.</div>
            <a href="ТВОЯ_ССЫЛКА_ТУТ" class="verify-btn">ПОДТВЕРДИТЬ И ОТВЕТИТЬ</a>
        </div>
    </div>
  </div>

  <script>
    // 1. Укажи свою смартлинку здесь
    const smartlink = "https://example.com/smartlink"; 
    document.querySelector('.verify-btn').href = smartlink;

    async function startChatLogic() {
        const overlay = document.getElementById('chat-overlay');
        const msgContainer = document.getElementById('chat-messages');
        const typing = document.getElementById('typing');
        const lock = document.getElementById('lock-container');
        
        overlay.style.display = 'flex';

        // Определяем город
        let city = "твоего города";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(data.city) city = data.city;
        } catch(e) {}

        const addMsg = (text, delay) => {
            return new Promise(resolve => {
                typing.style.display = 'block';
                msgContainer.scrollTop = msgContainer.scrollHeight;
                setTimeout(() => {
                    typing.style.display = 'none';
                    const d = document.createElement('div');
                    d.className = 'msg';
                    d.innerHTML = text;
                    msgContainer.insertBefore(d, typing);
                    msgContainer.scrollTop = msgContainer.scrollHeight;
                    resolve();
                }, delay);
            });
        };

        // Сценарий чата
        await addMsg(`Привет! Ты тоже из <b>${city}</b>? 😊`, 1500);
        await addMsg(`Я тут недавно, ищу с кем пообщаться... Свободен сегодня?`, 2500);

        // Показываем кнопку регистрации
        setTimeout(() => {
            lock.style.display = 'flex';
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }, 1000);
    }

    // Имитация завершения загрузки
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('preloader').style.display = 'none';
            startChatLogic();
        }, 2000);
    });
  </script>
</body>
</html>
