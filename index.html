<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Messenger</title>
    <style>
        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; --gray: #999; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }

        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid #333; z-index: 10; position: relative; }
        .header h1 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        
        #list-screen { height: 100vh; overflow-y: auto; padding-bottom: 100px; }
        .chat-row { display: flex; padding: 15px; border-bottom: 1px solid #222; align-items: center; cursor: pointer; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .info { flex: 1; margin-left: 15px; overflow: hidden; }
        .name { font-weight: 700; font-size: 16px; margin-bottom: 4px; display: block; }
        .preview { color: var(--accent); font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .typing { display: none; align-self: flex-start; background: #262629; padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; margin-top: 5px; }
        .dot { height: 6px; width: 6px; background: #bbb; border-radius: 50%; display: inline-block; animation: jump 1.4s infinite; margin-right: 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes jump { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        #push-note { position: fixed; top: -100px; left: 10px; right: 10px; background: rgba(30, 30, 30, 0.98); padding: 12px; border-radius: 18px; display: flex; align-items: center; z-index: 5000; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 1px solid #444; backdrop-filter: blur(10px); }
        #push-note.show { top: 15px; }

        #chat-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; flex-direction: column; }
        .chat-head { background: var(--card); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .back { font-size: 30px; color: var(--accent); margin-right: 15px; cursor: pointer; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; align-self: flex-start; background: #262629; line-height: 1.4; }
        
        .video-circle { width: 130px; height: 130px; border-radius: 50%; background: #333; display: none; align-items: center; justify-content: center; border: 3px solid var(--accent); position: relative; overflow: hidden; cursor: pointer; margin-top: 5px; }
        .video-circle::after { content: '▶'; color: white; font-size: 30px; z-index: 2; }
        .video-circle img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: blur(3px); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); width: 100%; max-width: 320px; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid #444; }
        .btn { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 16px; border-radius: 15px; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

<div id="push-note" onclick="openReg()">
    <img id="p-img" src="" style="width:45px; height:45px; border-radius:50%; margin-right:12px; object-fit:cover;">
    <div style="flex:1"><b id="p-name" style="font-size:14px; color:var(--accent);"></b><p id="p-msg" style="font-size:13px; color:#fff;"></p></div>
</div>

<div class="header"><h1>MESSENGER</h1></div>
<div id="list-screen"></div>

<div id="chat-screen">
    <div class="chat-head">
        <div class="back" onclick="history.back()">‹</div>
        <img id="c-av" class="avatar" style="width:40px; height:40px; border:none;">
        <span class="name" id="c-nm" style="margin-left:10px"></span>
    </div>
    <div class="msg-box" id="m-box">
        <div id="typing-ui" class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div class="input-bar" style="padding:15px; background:var(--card);" onclick="openReg()"><div style="background:#2c2c2e; padding:10px; border-radius:20px; color:var(--gray); font-size:14px;">...</div></div>
</div>

<div id="exit-pop" class="modal">
    <div class="card"><h2 id="eh"></h2><p id="ep" style="margin:10px 0; color:#ccc;"></p><a href="https://tone.affomelody.com/tHHtXh" class="btn" id="ebtn"></a></div>
</div>

<div id="reg-modal" class="modal">
    <div class="card"><h2 id="mh"></h2><p id="mp" style="margin:15px 0; color:#ccc;"></p><a href="https://tone.affomelody.com/tHHtXh" class="btn" id="mbtn"></a></div>
</div>

<script>
    const config = {
        ru: {
            eh: "УХОДИШЬ?", ep: "Рядом 147 девушек хотят секса. Останься!", ebtn: "ОСТАТЬСЯ",
            mh: "Доступ ограничен", mp: "Зарегистрируйся, чтобы смотреть видео.", mbtn: "СМОТРЕТЬ",
            names: ["Мария", "Катя", "Вика", "Лена", "Света", "Анжела"],
            chats: [
                ["Привет! Ты тут новенький? 😊", "Добавь фото, хочу на тебя посмотреть..."],
                ["Приветик! Ты откуда? 😉", "Вижу ты еще не в системе, пообщаемся?"],
                ["Ого, какой красавчик зашел! 😍", "Скинула бы фото, но заведи сначала профиль..."],
                ["Ты тут надолго? Ищу компанию на вечер", "Давай в приват? Тут нельзя слать горячее... 🔥"],
                ["Привет! Свободен сегодня? 😘", "Я новенькая, ищу смелого парня. Жду тебя!"],
                ["Вау! Привет красавчик! ❤️", "Регайся скорее, у меня для тебя сюрприз... 😈"]
            ],
            push: ["Смотри что у меня есть... 🔥", "Ты тут? Ответь мне! 😘"]
        },
        ua: {
            eh: "ЙДЕШ?", ep: "Поруч 147 дівчат хочуть сексу. Залишайся!", ebtn: "ЗАЛИШИТИСЬ",
            mh: "Доступ обмежено", mp: "Зареєструйся, щоб дивитися відео.", mbtn: "ДИВИТИСЬ",
            names: ["Оксана", "Юля", "Настя", "Іра", "Марина", "Олена"],
            chats: [
                ["Привіт! Ти тут новенький? 😊", "Додай фото, хочу на тебе подивитися..."],
                ["Привіт! Ти звідки? 😉", "Бачу ти ще не в системі, поспілкуємось?"],
                ["Ого, який красень зайшов! 😍", "Скинула б фото, але зроби спочатку профіль..."],
                ["Ти тут надовго? Шукаю компанію на вечір", "Давай у приват? Тут не можна слати гаряче... 🔥"],
                ["Привіт! Вільний сьогодні? 😘", "Я новенька, шукаю сміливого хлопця. Чекаю!"],
                ["Вау! Привіт красень! ❤️", "Реєструйся швидше, у мене для тебе сюрприз... 😈"]
            ],
            push: ["Дивись що в мене є... 🔥", "Ти тут? Відповідай! 😘"]
        }
    };

    const pushPhotos = ["https://images.pexels.com/photos/1181686/pexels-photo-1181686.jpeg?auto=compress&cs=tinysrgb&w=150","https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg?auto=compress&cs=tinysrgb&w=150"];
    const langMap = { 'ru':['ru','kz','be','uz'], 'ua':['uk'], 'es':['es','mx','ar'], 'en':['en','us','de','pl','fr'] };
    let userLang = 'en';
    const navLang = navigator.language.split('-')[0];
    for (let l in langMap) { if (langMap[l].includes(navLang)) userLang = l; }
    const cur = config[userLang] || config.ru;
    let isChat = false;

    // Заполнение текстов
    document.getElementById('eh').innerText = cur.eh; document.getElementById('ep').innerText = cur.ep; document.getElementById('ebtn').innerText = cur.ebtn;
    document.getElementById('mh').innerText = cur.mh; document.getElementById('mp').innerText = cur.mp; document.getElementById('mbtn').innerText = cur.mbtn;

    function buildList() {
        const list = document.getElementById('list-screen');
        cur.names.forEach((n, i) => {
            const row = document.createElement('div'); row.className = 'chat-row';
            row.innerHTML = `<img src="${i+2}.jpg" class="avatar"><div class="info"><span class="name">${n}</span><div class="preview">${cur.chats[i][0]}</div></div>`;
            row.onclick = () => { 
                isChat = true; 
                history.pushState({view:'chat'}, ""); 
                openChat(i); 
            };
            list.appendChild(row);
        });
    }

    async function openChat(i) {
        document.getElementById('c-nm').innerText = cur.names[i];
        document.getElementById('c-av').src = `${i+2}.jpg`;
        const mBox = document.getElementById('m-box');
        const tUi = document.getElementById('typing-ui');
        mBox.querySelectorAll('.bubble, .video-circle').forEach(e => e.remove());
        document.getElementById('chat-screen').style.display = 'flex';

        addB(cur.chats[i][0]);
        await wait(1500); tUi.style.display = 'block'; await wait(2500); tUi.style.display = 'none';
        addB(cur.chats[i][1]);
        await wait(1200); tUi.style.display = 'block'; await wait(2000); tUi.style.display = 'none';
        
        const v = document.createElement('div'); v.className = 'video-circle'; v.style.display = 'flex';
        v.innerHTML = `<img src="${i+2}.jpg">`; v.onclick = () => document.getElementById('reg-modal').style.display = 'flex';
        mBox.appendChild(v); mBox.scrollTop = 9999;
    }

    function addB(t) {
        const b = document.createElement('div'); b.className = 'bubble'; b.innerText = t;
        document.getElementById('m-box').appendChild(b); document.getElementById('m-box').scrollTop = 9999;
    }

    function showPush() {
        const p = document.getElementById('push-note');
        document.getElementById('p-name').innerText = cur.names[Math.floor(Math.random()*6)];
        document.getElementById('p-msg').innerText = cur.push[Math.floor(Math.random()*2)];
        document.getElementById('p-img').src = pushPhotos[Math.floor(Math.random()*2)];
        p.classList.add('show'); setTimeout(() => p.classList.remove('show'), 5000);
    }

    const wait = ms => new Promise(res => setTimeout(res, ms));
    function openReg() { window.location.href = "https://tone.affomelody.com/tHHtXh"; }

    // ЛОГИКА КНОПКИ НАЗАД (FIXED)
    function initHistory() {
        // Создаем фейковый стейт, чтобы "Назад" вел не из сайта, а на наше событие
        history.pushState({view: 'list'}, "");
        history.pushState({view: 'list'}, ""); 

        window.onpopstate = function(event) {
            if (isChat) {
                // Если мы в чате, просто закрываем его
                document.getElementById('chat-screen').style.display = 'none';
                isChat = false;
                history.pushState({view: 'list'}, ""); // Возвращаем возможность снова нажать назад
            } else {
                // Если мы в списке, показываем окно удержания
                document.getElementById('exit-pop').style.display = 'flex';
                // Чтобы кнопка назад не уводила с сайта сразу:
                history.pushState({view: 'list'}, "");
            }
        };
    }

    setInterval(() => { if(!isChat) showPush(); }, 20000);
    setTimeout(showPush, 4000);
    buildList();
    initHistory(); // Запуск фикса истории
</script>
    
</body>
</html>
