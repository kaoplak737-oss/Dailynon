<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dating Messenger</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLRMVTE398"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLRMVTE398');
    </script>

    <style>
        :root { --main-color: #ff4757; --bg: #f7f8fa; --text: #2f3542; --gray: #a4b0be; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Header */
        .header { background: var(--white); padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 16px; color: var(--main-color); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        /* List Screen */
        #list-screen { display: block; }
        .chat-row { display: flex; padding: 15px; background: var(--white); border-bottom: 1px solid #f1f1f1; cursor: pointer; align-items: center; }
        .avatar-box { position: relative; margin-right: 15px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main-color); }
        .on { width: 12px; height: 12px; background: #2ecc71; border: 2px solid #fff; border-radius: 50%; position: absolute; bottom: 5px; right: 2px; }
        .info { flex: 1; }
        .info-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .name { font-weight: 700; font-size: 16px; }
        .msg-preview { color: var(--gray); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .badge { background: var(--main-color); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        /* Chat Screen */
        #chat-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; }
        .chat-header { background: var(--white); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; color: var(--main-color); }
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; align-self: flex-start; background: #fff; border: 1px solid #eee; }
        .input-area { background: #fff; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .fake-input { flex: 1; background: #f1f2f6; padding: 10px 15px; border-radius: 20px; color: var(--gray); font-size: 14px; }

        /* Popups */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .card { background: #fff; width: 100%; max-width: 320px; border-radius: 25px; padding: 25px; text-align: center; }
        .card h2 { margin-bottom: 15px; font-size: 20px; }
        .card p { font-size: 14px; color: #57606f; margin-bottom: 20px; line-height: 1.5; }
        .btn { background: var(--main-color); color: #fff; text-decoration: none; display: block; padding: 15px; border-radius: 15px; font-weight: 700; margin-bottom: 10px; }
        
        .footer-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 150; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="t-head">Girls are writing to you now! ⚡</h1>
</div>

<div id="list-screen"></div>

<div id="chat-screen">
    <div class="chat-header">
        <div class="back-btn" onclick="closeChat()">←</div>
        <img id="chat-avatar" class="avatar" style="width:40px; height:40px; margin-right:10px;">
        <div class="name" id="chat-name">Name</div>
    </div>
    <div class="messages-area" id="msg-box"></div>
    <div class="input-area" onclick="openReg()">
        <div class="fake-input" id="t-input">Type a message...</div>
        <div style="color:var(--main-color); font-size:24px;">➤</div>
    </div>
</div>

<div class="footer-btn">
    <a href="https://tone.affomelody.com/tHHtXh" class="btn" id="t-main-btn" onclick="trackReg()">Quick Registration</a>
</div>

<!-- Popups -->
<div id="reg-modal" class="modal">
    <div class="card">
        <h2 id="rh">Finish Registration</h2>
        <p id="rp">To reply and see photos, you need a free profile.</p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn" onclick="trackReg()">Continue</a>
    </div>
</div>

<div id="exit-modal" class="modal">
    <div class="card">
        <h2 id="eh">Wait! Don't go!</h2>
        <p id="ep">Near you: <b>147</b> girls for no-strings fun and <b>233</b> for serious dating. Don't miss your chance!</p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn" onclick="trackReg()">Stay & Meet</a>
    </div>
</div>

<script>
    const translations = {
        ru: {
            head: "Девушки пишут тебе сами! 🔥",
            input: "Напишите сообщение...",
            mainBtn: "Быстрая регистрация",
            rh: "Нужна регистрация",
            rp: "Чтобы отвечать девушкам и смотреть их фото, создайте бесплатный профиль.",
            eh: "Ты точно хочешь уйти?",
            ep: "Рядом с тобой 147 девушек хотят секса без обязательств и 233 ищут серьезных отношений. Попробуй!",
            chats: [
                ["Мария", "Привет, вижу ты новенький тут! 😊", "Не хочешь добавить свое фото в профиль? Хочу тебя рассмотреть..."],
                ["Катя", "Приветик! Ты откуда?", "Вижу ты еще не зарегистрирован, но думаю мы пообщаемся позже? 😉"],
                ["Вика", "Ого, какой мужчина зашел!", "Сбросила бы тебе фото, но нужно чтобы ты завел анкету сначала..."],
                ["Елена", "Ты тут надолго? Ищу с кем провести вечер", "Давай перейдем в приват? Тут нельзя слать горячее... 🔥"],
                ["Светлана", "Привет! Свободен сегодня?", "Я тут новенькая, ищу смелого парня. Жду твой профиль!"],
                ["Анжела", "Вау! Привет красавчик!", "Регистрируйся скорее, я подготовила для тебя сюрприз... 😈"]
            ]
        },
        en: {
            head: "Girls are messaging you! 🔥",
            input: "Type a message...",
            mainBtn: "Quick Registration",
            rh: "Registration Needed",
            rp: "To reply and see photos, please create a free profile.",
            eh: "Wait! Don't go!",
            ep: "Near you: 147 girls want fun tonight and 233 seek serious dating. Don't miss out!",
            chats: [
                ["Maria", "Hi, I see you're new here! 😊", "Wanna add your photo? I'd love to see you..."],
                ["Kate", "Hey! Where are you from?", "Not registered yet? I hope we can chat properly soon 😉"],
                ["Vicky", "Wow, a new handsome guy!", "I'd send you a photo, but you need a profile first..."],
                ["Helen", "Staying long? Looking for company tonight.", "Let's go private? Can't send hot stuff here... 🔥"],
                ["Lana", "Hi! Free today?", "I'm new here, looking for a brave guy. Waiting for you!"],
                ["Angela", "Wow! Hello handsome!", "Register fast, I have a surprise for you... 😈"]
            ]
        }
        // Добавь другие языки по аналогии
    };

    const userLang = navigator.language.split('-')[0];
    const cur = translations[userLang] || translations.en;
    
    // Set texts
    document.getElementById('t-head').innerText = cur.head;
    document.getElementById('t-input').innerText = cur.input;
    document.getElementById('t-main-btn').innerText = cur.mainBtn;
    document.getElementById('rh').innerText = cur.rh;
    document.getElementById('rp').innerText = cur.rp;
    document.getElementById('eh').innerText = cur.eh;
    document.getElementById('ep').innerHTML = cur.ep;

    function buildList() {
        const container = document.getElementById('list-screen');
        cur.chats.forEach((chat, i) => {
            const row = document.createElement('div');
            row.className = 'chat-row';
            row.innerHTML = `
                <div class="avatar-box"><img src="${i+2}.jpg" class="avatar"><div class="on"></div></div>
                <div class="info">
                    <div class="info-top"><span class="name">${chat[0]}</span><span class="badge">1</span></div>
                    <div class="msg-preview">${chat[1]}</div>
                </div>
            `;
            row.onclick = () => openChat(i);
            container.appendChild(row);
        });
    }

    function openChat(index) {
        const data = cur.chats[index];
        document.getElementById('chat-name').innerText = data[0];
        document.getElementById('chat-avatar').src = `${index+2}.jpg`;
        document.getElementById('msg-box').innerHTML = '';
        document.getElementById('chat-screen').style.display = 'flex';
        
        // Появление сообщений с задержкой
        setTimeout(() => addBubble(data[1]), 500);
        setTimeout(() => addBubble(data[2]), 2500);
        
        gtag('event', 'open_chat_' + index);
    }

    function addBubble(text) {
        const b = document.createElement('div');
        b.className = 'bubble';
        b.innerText = text;
        document.getElementById('msg-box').appendChild(b);
    }

    function closeChat() {
        document.getElementById('chat-screen').style.display = 'none';
    }

    function openReg() {
        document.getElementById('reg-modal').style.display = 'flex';
        gtag('event', 'registration_click_fake_input');
    }

    function trackReg() {
        gtag('event', 'registration_click_final');
    }

    // Exit Intent / Back Button
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
        document.getElementById('exit-modal').style.display = 'flex';
        history.pushState(null, null, location.href);
    };

    buildList();
</script>
</body>
</html>
