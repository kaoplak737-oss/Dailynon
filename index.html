<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Знакомства рядом</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 30px;
        }

        .live-tag {
            display: inline-flex;
            align-items: center;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Сетка с фото */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        .photo-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 3/4;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .photo-card:hover { transform: scale(1.02); }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            color: #4ade80;
            display: flex;
            align-items: center;
        }

        .online-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* Кнопка */
        .cta-button {
            display: block;
            width: 100%;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 10px 25px -5px rgba(255, 0, 128, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .cta-button:active { transform: scale(0.98); }

        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="live-tag">
                <div class="live-dot"></div>
                <span id="live-text">147 женщин онлайн в твоем городе</span>
            </div>
            <h1 id="title">Ищешь девушку для отношений или шпили-вили?</h1>
            <p id="subtitle">Одинокие женщины ищут реальных знакомств прямо сейчас. Всё по-честному.</p>
        </div>

        <div class="photo-grid">
            <div class="photo-card">
                <img src="2.jpg" alt="Photo 2">
                <div class="online-status">Онлайн</div>
            </div>
            <div class="photo-card">
                <img src="3.jpg" alt="Photo 3">
                <div class="online-status">Онлайн</div>
            </div>
            <div class="photo-card">
                <img src="4.jpg" alt="Photo 4">
                <div class="online-status">Онлайн</div>
            </div>
            <div class="photo-card">
                <img src="5.jpg" alt="Photo 5">
                <div class="online-status">Онлайн</div>
            </div>
        </div>

        <a href="ТВОЯ_СМАРТЛИНКА" class="cta-button" id="btn-text">ЗАЙТИ НА САЙТ</a>

        <div class="footer-note">
            18+ Только для реальных встреч
        </div>
    </div>

    <script>
        // Простая логика переключения языков
        const lang = navigator.language || navigator.userLanguage;
        const isUkr = lang.includes('uk') || lang.includes('UA');

        if (isUkr) {
            document.getElementById('live-text').innerText = '147 жінок онлайн у твоєму місті';
            document.getElementById('title').innerText = 'Шукаєш дівчину для стосунків чи просто шпилі-вілі?';
            document.getElementById('subtitle').innerText = 'Самотні жінки шукають реальних знайомств прямо зараз. Усе по-чесному.';
            document.getElementById('btn-text').innerText = 'ЗАЙТИ НА САЙТ';
        }

        // Если хочешь подставить фото 2, 3, 4, 5, 6, 7 — они уже в сетке. 
        // Можно добавить JS для рандомного выбора из твоего набора:
        const images = document.querySelectorAll('.photo-card img');
        const availablePhotos = [2, 3, 4, 5, 6, 7];
        
        // Перемешиваем и подставляем, чтобы каждый раз было по-разному
        const shuffled = availablePhotos.sort(() => 0.5 - Math.random());
        images.forEach((img, index) => {
            img.src = shuffled[index] + '.jpg';
        });
    </script>
</body>
</html>
