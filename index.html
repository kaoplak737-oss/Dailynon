<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="user-scalable=false, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="./assets/css/config.css">
  <link rel="stylesheet" href="./assets/css/reset.css">  
  <link rel="stylesheet" href="./assets/css/style.css">
  <title>TikDate</title>
  <style>
    /* Стили для имитации чата */
    #chat-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        z-index: 9999;
        display: none; /* Появится после прелоадера */
        align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .chat-window {
        width: 90%; max-width: 380px; height: 550px;
        background: #fff; border-radius: 20px; overflow: hidden;
        display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .chat-header {
        padding: 15px; background: #fff; border-bottom: 1px solid #f0f0f0;
        display: flex; align-items: center; justify-content: space-between;
    }
    .header-user { display: flex; align-items: center; }
    .chat-avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; object-fit: cover; border: 2px solid #fe2c55; }
    .chat-name { font-weight: 700; color: #161823; font-size: 16px; display: block; }
    .chat-status { font-size: 13px; color: #73757f; display: flex; align-items: center; }
    .chat-status::before { content: ""; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-right: 5px; }

    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f8f8f8; display: flex; flex-direction: column; }
    .msg { 
        background: #fff; padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px;
        margin-bottom: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; color: #161823;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05); align-self: flex-start;
    }
    .typing-indicator { font-size: 13px; color: #fe2c55; font-weight: 500; margin-bottom: 10px; display: none; }

    .chat-input-area { padding: 15px; background: #fff; border-top: 1px solid #f0f0f0; position: relative; }
    #chat-input-fake { 
        width: 100%; padding: 12px 20px; background: #f1f1f2; border: none; 
        border-radius: 25px; outline: none; color: #73757f; font-size: 15px; cursor: pointer;
    }

    /* Окно блокировки (Замок) */
    .lock-overlay {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.98); display: none;
        flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 20px; z-index: 10;
        animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .lock-icon { width: 50px; margin-bottom: 15px; }
    .lock-title { font-weight: 700; font-size: 18px; margin-bottom: 10px; color: #161823; }
    .lock-text { font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.4; }
    .verify-btn { 
        background: #fe2c55; color: #fff; width: 100%; padding: 15px; 
        text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 16px;
        box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);
    }
  </style>
</head>
<body class="overlay">

  <div class="preloader active" id="preloader">
    <div class="preloader__wrapper">
      <img src="./assets/images/preloader/emoji.png" alt="Emoji" class="emoji">
      <img src="./assets/images/preloader/heart.png" alt="Heart" class="heart heart-1">
      <img src="./assets/images/preloader/heart.png" alt="Heart" class="heart heart-2">
      <p class="preloader__text">Поиск профиля . . .</p>
    </div>
  </div>

  <div id="chat-overlay">
    <div class="chat-window">
        <div class="chat-header">
            <div class="header-user">
                <img src="./assets/images/girl.png" alt="Avatar" class="chat-avatar">
                <div class="chat-user-info">
                    <span class="chat-name">Мария</span>
                    <span class="chat-status">В сети</span>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div id="typing" class="typing-indicator">Мария печатает...</div>
        </div>

        <div class="chat-input-area" id="input-trigger">
            <input type="text" id="chat-input-fake" value="Введите сообщение..." readonly>
            
            <div id="lock-block" class="lock-overlay">
                <img src="https://img.icons8.com/fluency/96/000000/lock.png" class="lock-icon" alt="Lock">
                <div class="lock-title">Чат ограничен</div>
                <div class="lock-text">
                    Мария принимает сообщения только от подтвержденных пользователей. <br>
                    <b>Подтвердите, что вы человек, чтобы ответить.</b>
                </div>
                <a href="ТВОЯ_ССЫЛКА_ЗДЕСЬ" id="final-link" class="verify-btn">ПОДТВЕРДИТЬ И ОТВЕТИТЬ</a>
            </div>
        </div>
    </div>
  </div>

  <script>
    // --- НАСТРОЙКИ ---
    const offerLink = "https://google.com"; // ВСТАВЬ СВОЮ СМАРТЛИНКУ
    document.getElementById('final-link').href = offerLink;

    async function startFlow() {
        const chatOverlay = document.getElementById('chat-overlay');
        const messagesContainer = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing');
        const lockBlock = document.getElementById('lock-block');
        
        // Показываем чат после скрытия прелоадера
        chatOverlay.style.display = 'flex';

        // 1. Определяем город
        let userCity = "твоего города";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(data.city) userCity = data.city;
        } catch(e) {}

        // Функция появления сообщения
        const showMsg = (text, delay) => {
            return new Promise(resolve => {
                typingIndicator.style.display = 'block';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                
                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = text;
                    messagesContainer.insertBefore(div, typingIndicator);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    resolve();
                }, delay);
            });
        };

        // Логика переписки
        await showMsg(`Привет! Ты тоже из <b>${userCity}</b>? 😊`, 2000);
        await showMsg(`Я тут совсем недавно, ищу с кем пообщаться... Свободен сегодня? Видел мою карусель в ТТ?`, 3500);

        // Показываем замок через секунду или при клике
        setTimeout(() => {
            lockBlock.style.display = 'flex';
        }, 1500);

        document.getElementById('input-trigger').onclick = () => {
            lockBlock.style.display = 'flex';
        };
    }

    // Имитация работы прелоадера
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('preloader').classList.remove('active');
            startFlow();
        }, 2500);
    });
  </script>
</body>
</html>
