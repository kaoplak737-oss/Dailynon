<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    
    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLRMVTE398"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLRMVTE398');
    </script>

    <style>
        :root { --tg-blue: #24A1DE; --bg: #f0f2f5; --white: #ffffff; --text: #000; --gray: #8e8e93; --online: #4caf50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Header */
        .app-header { background: var(--white); padding: 15px; border-bottom: 1px solid #dbdbdb; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .app-title { font-size: 20px; font-weight: 700; color: var(--tg-blue); }
        .status-icons { display: flex; gap: 10px; color: var(--gray); }

        /* Chat List */
        .inbox { max-width: 600px; margin: 0 auto; background: var(--white); min-height: 100vh; }
        .chat-item { display: flex; padding: 12px 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: background 0.2s; position: relative; text-decoration: none; color: inherit; }
        .chat-item:active { background: #f0f0f0; }
        
        .avatar-container { position: relative; margin-right: 15px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .online-dot { width: 12px; height: 12px; background: var(--online); border: 2px solid #fff; border-radius: 50%; position: absolute; bottom: 3px; right: 3px; }

        .chat-info { flex: 1; min-width: 0; }
        .chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .name { font-weight: 700; font-size: 16px; }
        .time { font-size: 12px; color: var(--gray); }
        
        .preview { font-size: 14px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
        .typing { color: var(--tg-blue); font-weight: 500; }
        .unread-badge { background: var(--tg-blue); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center; margin-top: 5px; float: right; }

        /* Popup */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-card { background: #fff; width: 100%; max-width: 320px; border-radius: 20px; padding: 25px; text-align: center; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-icon { font-size: 40px; margin-bottom: 15px; }
        .modal-h { font-weight: 800; font-size: 18px; margin-bottom: 10px; }
        .modal-p { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.4; }
        .btn-go { background: var(--tg-blue); color: #fff; text-decoration: none; display: block; padding: 15px; border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Bottom Nav (for realism) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #dbdbdb; display: flex; justify-content: space-around; padding: 10px 0; z-index: 90; }
        .nav-item { color: var(--gray); font-size: 10px; text-align: center; opacity: 0.6; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="app-title" id="t-chats">Chats</div>
    <div class="status-icons">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </div>
</div>

<div class="inbox" id="chat-list">
    <!-- Chats will be generated here -->
</div>

<div id="modal">
    <div class="modal-card">
        <div class="modal-icon">✉️</div>
        <div class="modal-h" id="mh">Private Message</div>
        <div class="modal-p" id="mp">You have new unread messages and photos. Open access to read.</div>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn-go" id="mb" onclick="trackReg()">Unlock Chat</a>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item">💬<br><span id="b1">Chats</span></div>
    <div class="nav-item">👤<br><span id="b2">Contacts</span></div>
    <div class="nav-item">⚙️<br><span id="b3">Settings</span></div>
</div>

<script>
    const translations = {
        ru: { title: "Чаты", m1: "Привет! Познакомимся?", m2: "Сбросила тебе фото, оценишь? 😉", m3: "Ты тут? Я скучаю...", m4: "Ого, ты классный!", m5: "Посмотришь мое видео?", m6: "Я рядом, заглянешь?", mh: "Приватный доступ", mp: "У вас 6 новых сообщений и 2 фото. Откройте доступ, чтобы прочитать.", mb: "ОТКРЫТЬ", b1: "Чаты", b2: "Контакты", b3: "Настройки", typing: "печатает..." },
        uk: { title: "Чати", m1: "Привіт! Познайомимося?", m2: "Скинула тобі фото, оціниш? 😉", m3: "Ти тут? Я сумую...", m4: "Ого, ти класний!", m5: "Подивишся моє відео?", m6: "Я поруч, заглянеш?", mh: "Приватний доступ", mp: "У вас 6 нових повідомлень та 2 фото. Відкрийте доступ, щоб прочитати.", mb: "ВІДКРИТИ", b1: "Чати", b2: "Контакти", b3: "Налаштування", typing: "пише..." },
        en: { title: "Chats", m1: "Hi! Wanna meet?", m2: "Sent you a photo, check it? 😉", m3: "Are you here? I miss you...", m4: "Wow, you look great!", m5: "Wanna see my video?", m6: "I'm nearby, come over?", mh: "Private Access", mp: "You have 6 new messages and 2 photos. Unlock access to read.", mb: "OPEN CHAT", b1: "Chats", b2: "Contacts", b3: "Settings", typing: "typing..." },
        pl: { title: "Czaty", m1: "Cześć! Poznamy się?", m2: "Wysłałam ci zdjęcie, ocenisz? 😉", m3: "Jesteś? Tęsknię...", m4: "Wow, jesteś super!", m5: "Zobaczysz moje wideo?", m6: "Jestem blisko, wpadniesz?", mh: "Prywatny dostęp", mp: "Masz 6 nowych wiadomości i 2 zdjęcia. Otwórz dostęp, aby przeczytać.", mb: "OTWÓRZ", b1: "Czaty", b2: "Kontakty", b3: "Ustawienia", typing: "pisze..." },
        de: { title: "Chats", m1: "Hi! Wollen wir uns treffen?", m2: "Habe dir ein Foto geschickt 😉", m3: "Bist du da? Ich vermisse dich...", m4: "Wow, du siehst toll aus!", m5: "Willst du mein Video sehen?", m6: "Ich bin in der Nähe, kommst du?", mh: "Privater Zugang", mp: "Du hast 6 neue Nachrichten und 2 Fotos. Freischalten zum Lesen.", mb: "ÖFFNEN", b1: "Chats", b2: "Kontakte", b3: "Einstellungen", typing: "schreibt..." },
        fr: { title: "Chats", m1: "Salut ! On se rencontre ?", m2: "Je t'ai envoyé une photo 😉", m3: "Tu es là ? Tu me manques...", m4: "Wow, tu es super !", m5: "Tu veux voir ma vidéo ?", m6: "Je suis tout près, tu viens ?", mh: "Accès Privé", mp: "Vous avez 6 nouveaux messages et 2 photos. Débloquez pour lire.", mb: "OUVRIR", b1: "Chats", b2: "Contacts", b3: "Paramètres", typing: "écrit..." },
        es: { title: "Chats", m1: "¡Hola! ¿Nos conocemos?", m2: "Te envié una foto, ¿la ves? 😉", m3: "¿Estás ahí? Te extraño...", m4: "¡Vaya, qué guapo!", m5: "¿Quieres ver mi video?", m6: "Estoy cerca, ¿vienes?", mh: "Acceso Privado", mp: "Tienes 6 mensajes nuevos и 2 fotos. Desbloquea para leer.", mb: "ABRIR", b1: "Chats", b2: "Contactos", b3: "Ajustes", typing: "escribiendo..." },
        tr: { title: "Sohbetler", m1: "Selam! Tanışalım mı?", m2: "Sana bir fotoğraf gönderdim 😉", m3: "Orada mısın? Seni özledim...", m4: "Vay, harikasın!", m5: "Videomu izlemek ister misin?", m6: "Yakındayım, gelir misin?", mh: "Özel Erişim", mp: "6 yeni mesajınız ve 2 fotoğrafınız var. Okumak için erişimi açın.", mb: "AÇ", b1: "Sohbetler", b2: "Kişiler", b3: "Ayarlar", typing: "yazıyor..." }
        // ... можно добавить еще 25+ языков аналогично
    };

    const names = ["Klubnicka", "Maria", "Svetlana", "Vika", "Elena", "Angela"];
    const userLang = navigator.language.split('-')[0];
    const cur = translations[userLang] || translations.en;

    // Set Static Text
    document.getElementById('t-chats').innerText = cur.title;
    document.getElementById('mh').innerText = cur.mh;
    document.getElementById('mp').innerText = cur.mp;
    document.getElementById('mb').innerText = cur.mb;
    document.getElementById('b1').innerText = cur.b1;
    document.getElementById('b2').innerText = cur.b2;
    document.getElementById('b3').innerText = cur.b3;

    function buildInbox() {
        const list = document.getElementById('chat-list');
        for (let i = 1; i <= 6; i++) {
            const chat = document.createElement('div');
            chat.className = 'chat-item';
            chat.innerHTML = `
                <div class="avatar-container">
                    <img src="${i + 1}.jpg" class="avatar">
                    <div class="online-dot"></div>
                </div>
                <div class="chat-info">
                    <div class="chat-top">
                        <span class="name">${names[i-1]}</span>
                        <span class="time">1${i}:4${i}</span>
                    </div>
                    <div class="preview" id="prev-${i}">
                        ${cur['m' + i]}
                    </div>
                    <div class="unread-badge">${Math.floor(Math.random() * 3) + 1}</div>
                </div>
            `;
            chat.onclick = openModal;
            list.appendChild(chat);
        }
    }

    function openModal() {
        document.getElementById('modal').style.display = 'flex';
        gtag('event', 'chat_click', {'event_category': 'engagement'});
    }

    function trackReg() {
        gtag('event', 'registration_click', {'event_category': 'outbound'});
    }

    // Typing effect for the first girl
    function startTyping() {
        const p1 = document.getElementById('prev-1');
        setTimeout(() => {
            p1.innerHTML = `<span class="typing">${cur.typing}</span>`;
            setTimeout(() => {
                p1.innerText = cur.m1;
                startTyping();
            }, 3000);
        }, 2000);
    }

    buildInbox();
    startTyping();

    // Back button capture
    history.pushState(null, null, location.href);
    window.onpopstate = () => {
        openModal();
        history.pushState(null, null, location.href);
    };
</script>
</body>
</html>
