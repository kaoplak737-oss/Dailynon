<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Access Granted</title>
    
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "w1u9rimu1f");
    </script>

    <style>
        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .loader { width: 60px; height: 60px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .profile-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #333; display: none; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .blur-media { width: 100%; height: 180px; background: url('2.jpg') center; background-size: cover; border-radius: 15px; filter: blur(20px); margin-bottom: 20px; border: 1px solid #444; }
        .status { color: #4cd964; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; line-height: 1.4; margin-bottom: 25px; }
        .btn { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; font-size: 15px; box-shadow: 0 8px 15px rgba(255, 45, 85, 0.3); transition: 0.1s; }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-state">
        <div class="loader"></div>
        <p id="l-text">Connecting...</p>
    </div>

    <div class="profile-card" id="card">
        <span class="status" id="s-text">Online Now</span>
        <h2 id="h-text">User Found!</h2>
        <div class="blur-media"></div>
        <p id="p-text">To start chatting, you must complete a quick registration.</p>
        <a href="https://tone.affomelody.com/tHHtXh" class="btn" id="b-text">REGISTER & CHAT</a>
    </div>
</div>

<script>
    const lang = {
        ru: { l: "Поиск профиля TikTok...", h: "Пользователь найден!", s: "Сейчас в сети", p: "Чтобы написать девушке из TikTok, нужно пройти быструю бесплатную регистрацию.", b: "ЗАРЕГИСТРИРОВАТЬСЯ" },
        uk: { l: "Пошук профілю TikTok...", h: "Користувача знайдено!", s: "Зараз онлайн", p: "Щоб написати дівчині з TikTok, потрібно пройти швидку безкоштовну реєстрацію.", b: "ЗАРЕЄСТРУВАТИСЯ" },
        kk: { l: "Профиль ізделуде...", h: "Пайдаланушы табылды!", s: "Қазір желіде", p: "TikTok-тағы қызға жазу үшін жылдам тегін тіркелуден өту керек.", b: "ТІРКЕЛУ" },
        pl: { l: "Szukanie profilu...", h: "Znaleziono użytkownika!", s: "Teraz online", p: "Aby napisać do dziewczyny z TikToka, musisz przejść szybką darmową rejestrację.", b: "ZAREJESTRUJ SIĘ" },
        es: { l: "Buscando perfil...", h: "¡Usuario encontrado!", s: "En línea", p: "Para mensajear a la chica de TikTok, debes completar el registro gratuito.", b: "REGISTRARSE" },
        it: { l: "Ricerca profilo...", h: "Utente trovato!", s: "Online ora", p: "Per scrivere alla ragazza di TikTok, devi completare la registrazione gratuita.", b: "REGISTRATI" },
        de: { l: "Profilsuche...", h: "Benutzer gefunden!", s: "Jetzt online", p: "Um dem Mädchen aus TikTok zu schreiben, müssen Sie sich kostenlos registrieren.", b: "JETZT REGISTRIEREN" },
        lv: { l: "Meklē profilu...", h: "Lietotājs atrasts!", s: "Tiešsaistē", p: "Lai rakstītu meitenei no TikTok, jums jāveic bezmaksas reģistrācija.", b: "REĢISTRĒTIES" },
        lt: { l: "Ieškoma profilio...", h: "Vartotojas rastas!", s: "Prisijungęs", p: "Norėdami parašyti merginai iš TikTok, turite atlikti nemokamą registraciją.", b: "REGISTRUOTIS" },
        et: { l: "Profiili otsimine...", h: "Kasutaja leitud!", s: "Praegu liinis", p: "TikToki tüdrukule kirjutamiseks peate läbima tasuta registreerimise.", b: "REGISTREERU" },
        fr: { l: "Recherche du profil...", h: "Utilisateur trouvé !", s: "En ligne", p: "Pour écrire à la fille de TikTok, vous devez compléter l'inscription gratuite.", b: "S'INSCRIRE" },
        nl: { l: "Profiel zoeken...", h: "Gebruiker gevonden!", s: "Nu online", p: "Om het meisje van TikTok te berichten, moet je je gratis registreren.", b: "REGISTREREN" },
        en: { l: "Scanning TikTok ID...", h: "User Found!", s: "Online Now", p: "To message the girl from TikTok, you must complete a free registration.", b: "REGISTER & CHAT" }
    };

    let uLang = navigator.language.split('-')[0];
    if(uLang === 'ua' || uLang === 'be') uLang = (uLang === 'ua') ? 'uk' : 'ru';
    const cur = lang[uLang] || lang.en;

    Object.keys(cur).forEach(key => {
        const el = document.getElementById(key + (key.length === 1 ? '-text' : ''));
        if(el) el.innerText = cur[key];
    });

    setTimeout(() => {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('card').style.display = 'block';
    }, 2000);
</script>
</body>
</html>
