<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Система поиска контактов</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #00ff41; /* Цвет хакера/матрицы, внушает доверие к системе */
            --card: #111418;
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }

        /* Шапка системы */
        .top-bar {
            padding: 10px 15px;
            background: #1a1d23;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* Лента логов (слева сверху) */
        .logs {
            height: 120px;
            padding: 10px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            font-size: 10px;
            color: #666;
            line-height: 1.4;
        }

        .log-entry { margin-bottom: 4px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .log-accent { color: #888; }

        /* Центральный блок */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .radar {
            width: 150px;
            height: 150px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: relative;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .radar::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: conic-gradient(from 0deg, rgba(0,255,65,0.4), transparent);
            border-radius: 50%;
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .target-found {
            margin-top: 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Карточка совпадения */
        .match-card {
            background: var(--card);
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333;
            display: none; /* Скрыта до конца "поиска" */
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .girl-photo {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }

        .status-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--accent); color: #000;
            padding: 3px 8px; font-size: 10px; font-weight: 900; border-radius: 4px;
        }

        /* Кнопки */
        .cta-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #000;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .cta-btn:active { transform: scale(0.95); opacity: 0.8; }

        .footer-info {
            padding: 15px;
            font-size: 10px;
            color: #444;
            text-align: center;
        }

        /* Скрытие элементов для анимации */
        #scanning-box { display: block; }
    </style>
</head>
<body>

<div class="top-bar">
    <span>System: active</span>
    <span id="clock">00:00:00</span>
</div>

<div class="logs" id="log-container">
    <!-- Логи добавляются скриптом -->
</div>

<div class="main-stage">
    <div id="scanning-box">
        <div class="radar"></div>
        <div class="target-found" id="status-text">Сканирование...</div>
    </div>

    <div class="match-card" id="match-box">
        <div class="girl-photo" id="photo-div" style="background-image: url('2.jpg');">
            <div class="status-badge">ONLINE</div>
        </div>
        <div style="text-align: left;">
            <div style="font-size: 18px; font-weight: 700;" id="name-tag">Катя, 24</div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">📍 Расстояние: 1.4 км</div>
        </div>
        <a href="ТВОЯ_СМАРТЛИНКА" class="cta-btn" id="btn-text">УСТАНОВИТЬ СВЯЗЬ</a>
    </div>
</div>

<div class="footer-info">
    Внимание: Все каналы связи защищены сквозным шифрованием. 18+
</div>

<script>
    const logContainer = document.getElementById('log-container');
    const logs = [
        "Инициализация протокола...",
        "Определение ГЕО-позиции...",
        "Поиск активных анкет...",
        "Пользователь id883 зашел в приват...",
        "Найдено совпадение в радиусе 2км",
        "Марина (21) отправила фото...",
        "Синхронизация с базой данных...",
        "Алина (27) ищет партнера..."
    ];

    const lang = (navigator.language || navigator.userLanguage).includes('uk') ? 'uk' : 'ru';
    const names = ["Катя, 24", "Алина, 27", "Вика, 31", "Маша, 22"];
    const photos = [2, 3, 4, 5];

    // Часы
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Добавление логов
    let logIdx = 0;
    function addLog() {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-accent">[${new Date().toLocaleTimeString()}]</span> ${logs[logIdx % logs.length]}`;
        logContainer.prepend(entry);
        logIdx++;
    }
    const logInterval = setInterval(addLog, 1500);

    // Симуляция поиска
    setTimeout(() => {
        document.getElementById('status-text').innerText = lang === 'uk' ? "ЗНАЙДЕНО!" : "НАЙДЕНО!";
        document.getElementById('status-text').style.color = "#fff";
        
        setTimeout(() => {
            document.getElementById('scanning-box').style.display = 'none';
            const matchBox = document.getElementById('match-box');
            matchBox.style.display = 'block';

            // Если на UA
            if(lang === 'uk') {
                document.getElementById('btn-text').innerText = "ВСТАНОВИТИ ЗВ'ЯЗОК";
                document.getElementById('name-tag').innerText = "Катя, 24";
            }
        }, 1000);
    }, 4000);

    // Смена фото в карточке до клика
    let photoIdx = 0;
    setInterval(() => {
        if(document.getElementById('match-box').style.display === 'block') {
            photoIdx = (photoIdx + 1) % photos.length;
            document.getElementById('photo-div').style.backgroundImage = `url('${photos[photoIdx]}.jpg')`;
            document.getElementById('name-tag').innerText = names[photoIdx];
        }
    }, 3000);
</script>

</body>
</html>
