<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat | TikDate</title>
    <!-- Звук уведомления (стандартный короткий писк) -->
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <style>
        :root { --primary: #fe2c55; --online: #4caf50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; overflow: hidden; }

        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        #chat-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(8px);
        }

        .chat-card {
            width: 92%; max-width: 380px; height: 85vh;
            background: #fff; border-radius: 30px; display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); overflow: hidden; position: relative;
        }

        .header { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; background: #fff; z-index: 10; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid var(--primary); }
        .u-name { font-weight: 700; font-size: 17px; color: #161823; }
        .u-status { font-size: 12px; color: #8a8b91; transition: 0.5s; }
        .u-status.online { color: var(--online); font-weight: 800; }

        .msg-area { 
            flex: 1; padding: 15px; overflow-y: auto; 
            background: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%);
            display: flex; flex-direction: column; gap: 12px; 
        }

        .bubble { 
            max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; 
            position: relative; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .received { background: rgba(255, 255, 255, 0.95); color: #000; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sent { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; padding-bottom: 20px; }

        .status-ticks { position: absolute; bottom: 4px; right: 12px; font-size: 10px; color: rgba(255,255,255,0.7); }
        .status-ticks.read { color: #40c4ff; }

        .typing-bubble { display: flex; align-items: center; gap: 4px; padding: 15px !important; }
        .dot { width: 6px; height: 6px; background: #adb5bd; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        /* Блюр фото - секретное оружие конверта */
        .blur-photo { width: 120px; height: 160px; border-radius: 15px; filter: blur(12px); border: 2px solid #fff; margin-top: 5px; cursor: pointer; }

        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.1); } }
        @keyframes pop { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .action-zone { padding: 15px; background: #fff; border-top: 1px solid #eee; text-align: center; }
        .btn-reply { background: #f1f1f2; border: none; padding: 12px 18px; border-radius: 25px; font-size: 14px; font-weight: 600; cursor: pointer; color: #161823; margin: 4px; }

        .input-bar { padding: 15px; background: #fff; border-top: 1px solid #eee; display: none; align-items: center; gap: 10px; cursor: pointer; }
        .fake-input { flex: 1; background: #f1f1f2; padding: 10px 15px; border-radius: 20px; font-size: 14px; color: #8a8b91; }

        /* Окно регистрации с таймером */
        .lock-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; background: #fff; padding: 30px 20px; 
            border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -15px 40px rgba(0,0,0,0.2); 
            transform: translateY(105%); transition: 0.5s; z-index: 100; text-align: center;
        }
        .lock-overlay.active { transform: translateY(0); }
        .timer-tag { background: #fff0f3; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 15px; display: inline-block; }
        .btn-reg { background: var(--primary); color: #fff; text-decoration: none; display: block; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 18px; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="video-bg">
    <video src="./assets/files/video.mp4" loop playsinline autoplay muted></video>
</div>

<div id="chat-overlay">
    <div class="chat-card">
        <div class="header">
            <img src="https://images.unsplash.com/photo-1516062423079-7ca13cdc7f5a?auto=format&fit=crop&w=150&q=80" class="avatar">
            <div>
                <div class="u-name">Klubnicka69</div>
                <div class="u-status" id="ui-status">...</div>
            </div>
        </div>

        <div class="msg-area" id="box"></div>

        <div class="action-zone" id="ui-actions">
            <div id="ui-instr" style="font-size: 13px; color: #8a8b91; margin-bottom: 10px;">...</div>
            <div class="quick-replies" id="replies-container"></div>
        </div>

        <div class="input-bar" id="ui-input" onclick="showLock()">
            <div class="fake-input" id="ui-input-text">...</div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M2 21L23 12L2 3V10L17 12L2 14V21Z" fill="#fe2c55"/></svg>
        </div>

        <div class="lock-overlay" id="lock-block">
            <div class="timer-tag" id="ui-timer">Waiting for answer: 04:59</div>
            <div style="font-weight:900; font-size:22px; margin-bottom:10px;" id="ui-lock-title">...</div>
            <div style="font-size:15px; color:#5e6066; margin-bottom:25px; line-height: 1.4;" id="ui-lock-desc">...</div>
            <a href="ТВОЯ_ССЫЛКА_ТУТ" class="btn-reg" id="ui-btn">...</a>
        </div>
    </div>
</div>

<script>
    const translations = {
        ru: { lastSeen: "Была 15 мин. назад", online: "В сети", instr: "Выберите приветствие:", sent: "Доставлено", read: "Прочитано", replies: ["Привет! 👋", "Ты красотка! 😍", "Познакомимся? 😊"], m1: "Привет! ❤️ Ты первый, кто мне решил написать за последний месяц. Я уже хотела удалять свою анкету... 🥰", m2: "Как тебя зовут? Ты откуда? Кстати, хочешь увидеть моё фото? 🤫", input: "Написать ответ...", lt: "Продолжить общение", ld: "Klubnicka69 ждет твой ответ! Создай бесплатный профиль, чтобы увидеть её приватные фото и продолжить чат.", lb: "ОТВЕТИТЬ ЕЙ", timer: "Ждет ответа: " },
        uk: { lastSeen: "Була 15 хв. тому", online: "В мережі", instr: "Оберіть вітання:", sent: "Доставлено", read: "Прочитано", replies: ["Привіт! 👋", "Ти красуня! 😍", "Познайомимося? 😊"], m1: "Привіт! ❤️ Ти перший, хто мені вирішив написати за останній місяць. Я вже хотіла видаляти свою анкету... 🥰", m2: "Як тебе звати? Ти звідки? До речі, хочеш побачити моє фото? 🤫", input: "Написати...", lt: "Продовжити спілкування", ld: "Klubnicka69 чекає на твою відповідь! Створи безкоштовний профіль, щоб побачити приватні фото та продовжити чат.", lb: "ВІДПОВІСТИ ЇЙ", timer: "Чекає: " },
        en: { lastSeen: "Was online 15m ago", online: "Online", instr: "Say Hi:", sent: "Delivered", read: "Read", replies: ["Hey! 👋", "You are hot! 😍", "Let's chat! 😊"], m1: "Hi! ❤️ You're the first person who's written to me in the last month. I was just about to delete my profile... 🥰", m2: "What's your name? Where are you from? By the way, want to see my photo? 🤫", input: "Type answer...", lt: "Continue Chat", ld: "Klubnicka69 is waiting for you! Create a free profile to see her private photos and keep chatting.", lb: "REPLY TO HER", timer: "Waiting: " },
        de: { lastSeen: "Vor 15 Min.", online: "Online", instr: "Wähle:", sent: "Zugestellt", read: "Gelesen", replies: ["Hallo! 👋", "Hübsch! 😍", "Chatten? 😊"], m1: "Hallo! ❤️ Du bist der Erste, der mir im letzten Monat geschrieben hat. Ich wollte mein Profil gerade löschen... 🥰", m2: "Wie heißt du? Woher kommst du? Übrigens, willst du mein Foto sehen? 🤫", input: "Schreiben...", lt: "Weiter chatten", ld: "Klubnicka69 wartet! Erstelle ein Profil, um ihre privaten Fotos zu sehen.", lb: "IHR ANTWORTEN", timer: "Wartet: " },
        fr: { lastSeen: "Il y a 15 min", online: "En ligne", instr: "Choisissez :", sent: "Distribué", read: "Lu", replies: ["Salut! 👋", "Belle! 😍", "On discute? 😊"], m1: "Salut! ❤️ Tu es la première personne qui m'écrit depuis un mois. J'allais supprimer mon profil... 🥰", m2: "C'est quoi ton nom? Tu viens d'où? Au fait, tu veux voir ma photo? 🤫", input: "Écrire...", lt: "Continuer", ld: "Klubnicka69 attend! Créez un profil pour voir ses photos privées.", lb: "LUI RÉPONDRE", timer: "En attente: " },
        es: { lastSeen: "Hace 15 min", online: "En línea", instr: "Elige:", sent: "Entregado", read: "Leído", replies: ["¡Hola! 👋", "¡Guapa! 😍", "¿Hablamos? 😊"], m1: "¡Hola! ❤️ Eres el primero que me escribe en el último mes. Estaba a punto de borrar mi perfil... 🥰", m2: "¿Cómo te llamas? ¿De dónde eres? Por cierto, ¿quieres ver mi foto? 🤫", input: "Escribir...", lt: "Continuar", ld: "¡Klubnicka69 te espera! Crea un perfil para ver sus fotos privadas.", lb: "RESPONDER", timer: "Esperando: " }
    };

    const getLang = () => {
        const n = navigator.language.split('-')[0];
        return translations[n] ? n : 'en';
    };

    const cur = translations[getLang()];
    const sound = document.getElementById('msg-sound');

    // UI Init
    document.getElementById('ui-status').innerText = cur.lastSeen;
    document.getElementById('ui-instr').innerText = cur.instr;
    document.getElementById('ui-input-text').innerText = cur.input;
    document.getElementById('ui-lock-title').innerText = cur.lt;
    document.getElementById('ui-lock-desc').innerText = cur.ld;
    document.getElementById('ui-btn').innerText = cur.lb;

    const cont = document.getElementById('replies-container');
    cur.replies.forEach(t => {
        const b = document.createElement('button');
        b.className = 'btn-reply'; b.innerText = t;
        b.onclick = () => { sound.play().catch(()=>{}); startSeq(t); };
        cont.appendChild(b);
    });

    async function startSeq(t) {
        document.getElementById('ui-actions').style.display = 'none';
        const box = document.getElementById('box');
        const d = document.createElement('div');
        d.className = 'bubble sent';
        d.innerHTML = `${t}<div class="status-ticks" id="tick">${cur.sent}</div>`;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;

        await new Promise(r => setTimeout(r, 2000));
        document.getElementById('tick').innerText = cur.read;
        document.getElementById('tick').classList.add('read');
        
        const st = document.getElementById('ui-status');
        st.innerText = cur.online; st.classList.add('online');

        await new Promise(r => setTimeout(r, 1000));
        showTyping();
        await new Promise(r => setTimeout(r, 5000));
        hideTyping();
        addMsg(cur.m1);

        await new Promise(r => setTimeout(r, 2000));
        showTyping();
        await new Promise(r => setTimeout(r, 2500));
        hideTyping();
        addMsg(cur.m2);
        
        // Маленький заблюренный подарок (фото)
        const img = document.createElement('img');
        img.src = "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=300&q=20";
        img.className = 'received blur-photo';
        img.onclick = showLock;
        box.appendChild(img);
        box.scrollTop = box.scrollHeight;

        document.getElementById('ui-input').style.display = 'flex';
        startTimer();
    }

    function addMsg(txt) {
        sound.play().catch(()=>{});
        const b = document.getElementById('box');
        const d = document.createElement('div');
        d.className = 'bubble received'; d.innerHTML = txt;
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }

    function showTyping() {
        const b = document.getElementById('box');
        const d = document.createElement('div');
        d.className = 'bubble received typing-bubble'; d.id = 'tp';
        d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        b.appendChild(d); b.scrollTop = b.scrollHeight;
    }

    function hideTyping() { if(document.getElementById('tp')) document.getElementById('tp').remove(); }
    
    function showLock() { document.getElementById('lock-block').classList.add('active'); }

    function startTimer() {
        let m = 4, s = 59;
        setInterval(() => {
            if(s === 0) { m--; s = 59; } else { s--; }
            document.getElementById('ui-timer').innerText = cur.timer + `0${m}:` + (s < 10 ? '0'+s : s);
        }, 1000);
    }
</script>
</body>
</html>
