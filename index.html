<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Messenger</title>
    <style>
        :root { --accent: #ff2d55; --bg: #0b0b0d; --card: #1c1c1e; --text: #ffffff; --gray: #999; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid #333; z-index: 100; position: relative; }
        .header h1 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        #list-screen { height: 100vh; overflow-y: auto; padding-bottom: 160px; -webkit-overflow-scrolling: touch; }
        .chat-row { display: flex; padding: 15px; border-bottom: 1px solid #222; align-items: center; cursor: pointer; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .info { flex: 1; margin-left: 15px; overflow: hidden; }
        .name { font-weight: 700; font-size: 16px; margin-bottom: 4px; display: block; }
        .preview { color: var(--accent); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 15px; border-top: 1px solid #333; z-index: 200; }
        .btn-reg { background: var(--accent); color: #fff; text-align: center; padding: 14px; border-radius: 12px; font-weight: 800; text-decoration: none; display: block; font-size: 15px; text-transform: uppercase; }
        .typing { display: none; align-self: flex-start; background: #262629; padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; }
        .dot { height: 6px; width: 6px; background: #bbb; border-radius: 50%; display: inline-block; animation: jump 1.4s infinite; margin-right: 2px; }
        @keyframes jump { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        #push-note { position: fixed; top: -100px; left: 10px; right: 10px; background: rgba(30, 30, 30, 0.98); padding: 12px; border-radius: 18px; display: flex; align-items: center; z-index: 5000; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 1px solid #444; backdrop-filter: blur(10px); }
        #push-note.show { top: 15px; }
        #chat-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; flex-direction: column; }
        .chat-head { background: var(--card); padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .back { font-size: 30px; color: var(--accent); margin-right: 15px; cursor: pointer; padding: 0 10px; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; align-self: flex-start; background: #262629; line-height: 1.4; }
        .video-circle { width: 130px; height: 130px; border-radius: 50%; background: #333; display: none; align-items: center; justify-content: center; border: 3px solid var(--accent); position: relative; overflow: hidden; margin-top: 5px; }
        .video-circle::after { content: '▶'; color: white; font-size: 30px; z-index: 2; }
        .video-circle img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: blur(3px); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--card); width: 100%; max-width: 320px; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid #444; }
        .btn { background: var(--accent); color: #fff; text-decoration: none; display: block; padding: 16px; border-radius: 15px; font-weight: 800; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="push-note" onclick="showRegModal()">
    <img id="p-img" src="" style="width:45px; height:45px; border-radius:50%; margin-right:12px; object-fit:cover;">
    <div style="flex:1"><b id="p-name" style="font-size:14px; color:var(--accent);"></b><p id="p-msg" style="font-size:13px; color:#fff;"></p></div>
</div>

<div class="header"><h1>MESSENGER</h1></div>

<div id="list-screen">
    <div id="chats-container"></div>
    <div class="bottom-nav">
        <a href="javascript:void(0)" onclick="showRegModal()" class="btn-reg" id="fix-btn">REGISTRATION</a>
    </div>
</div>

<div id="chat-screen">
    <div class="chat-head"><div class="back" onclick="handleBack()">‹</div><img id="c-av" class="avatar" style="width:40px; height:40px; border:none;"><span class="name" id="c-nm" style="margin-left:10px"></span></div>
    <div class="msg-box" id="m-box"><div id="typing-ui" class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    <div class="input-bar" style="padding:15px; background:var(--card);" onclick="showRegModal()"><div id="input-placeholder" style="background:#2c2c2e; padding:10px; border-radius:20px; color:var(--gray); font-size:14px;">...</div></div>
</div>

<div id="exit-pop" class="modal">
    <div class="card"><h2 id="eh"></h2><p id="ep" style="margin:10px 0; color:#ccc;"></p><div class="btn" onclick="goLink()" id="ebtn"></div></div>
</div>

<div id="reg-modal" class="modal">
    <div class="card"><h2 id="mh"></h2><p id="mp" style="margin:15px 0; color:#ccc;"></p><div class="btn" onclick="goLink()" id="mbtn"></div></div>
</div>

<script>
    const languages = {
        ua: { eh: "ЗАЧЕКАЙ!", ep: "Поруч 147 дівчат хочуть познайомитись. Не йди!", ebtn: "ЗАЛИШИТИСЬ", mh: "Реєстрація", mp: "Для спілкування та перегляду відео потрібно пройти швидку реєстрацію.", mbtn: "ПРОДОВЖИТИ", names: ["Оксана","Юля","Настя","Іра","Марина","Олена"], chats: [["Привіт! Ти тут новенький? 😊","Додай фото, хочу на тебе подивитися..."],["Привіт! Ти звідки? 😉","Бачу ти ще не в системі, поспілкуємось?"],["Ого, який красень зайшов! 😍","Скинула б відео, але зроби спочатку профіль..."],["Ти тут надовго? Шукаю компанію","Давай у приват? Тут не можна слати гаряче... 🔥"],["Привіт! Вільний сьогодні? 😘","Я новенька, шукаю сміливого хлопця."],["Вау! Привіт красень! ❤️","Реєструйся швидше, у мене для тебе сюрприз... 😈"]], push: ["Дивись що в мене є... 🔥","Відповідай мені! 😘"], fixBtn: "ШВИДКА РЕЄСТРАЦІЯ", ph: "Написати повідомлення..." },
        ru: { eh: "ПОДОЖДИ!", ep: "Рядом 147 девушек хотят познакомиться. Не уходи!", ebtn: "ОСТАТЬСЯ", mh: "Регистрация", mp: "Для общения и просмотра видео нужно пройти быструю регистрацию.", mbtn: "ПРОДОЛЖИТЬ", names: ["Мария","Катя","Вика","Лена","Света","Анжела"], chats: [["Привет! Ты тут новенький? 😊","Добавь фото, хочу на тебя посмотреть..."],["Приветик! Ты откуда? 😉","Вижу ты еще не в системе, пообщаемся?"],["Ого, какой красавчик зашел! 😍","Скинула бы видео, но заведи сначала профиль..."],["Ты тут надолго? Ищу компанию","Давай в приват? Тут нельзя слать горячее... 🔥"],["Привет! Свободен сегодня? 😘","Я новенькая, ищу смелого парня."],["Вау! Привет красавчик! ❤️","Регайся скорее, у меня для тебя сюрприз... 😈"]], push: ["Смотри что у меня есть... 🔥","Ответь мне! 😘"], fixBtn: "БЫСТРАЯ РЕГИСТРАЦИЯ", ph: "Написать сообщение..." },
        es: { eh: "¡ESPERA!", ep: "147 chicas cerca quieren conocerte. ¡No te vayas!", ebtn: "QUEDARME", mh: "Registro", mp: "Debes registrarte para chatear и ver videos.", mbtn: "CONTINUAR", names: ["Lucía","Martina","Sofía","Valeria","Alba","Paula"], chats: [["¡Hola! ¿Eres nuevo aquí? 😊","Sube tu foto, quiero verte..."],["¡Hola! ¿De dónde eres? 😉","¿Aún no registrado? ¡Hablemos!"],["¡Vaya, qué guapo! 😍","Te enviaría un video, pero necesitas un perfil..."],["¿Te quedas mucho? Busco compañía","¿Vamos al privado? Aquí no puedo enviar nada hot... 🔥"],["¡Hola! ¿Libre hoy? 😘","Soy nueva, busко un chico atrevido."],["¡Wow! ¡Hola bombón! ❤️","Regístrate ya, tengo una sorpresa para ti... 😈"]], push: ["Mira lo que tengo... 🔥","¡Responde! 😘"], fixBtn: "REGISTRO RÁPIDO", ph: "Escribir mensaje..." },
        en: { eh: "WAIT!", ep: "147 girls nearby want to meet you. Don't go!", ebtn: "STAY", mh: "Registration", mp: "You need to register to chat and watch videos.", mbtn: "CONTINUE", names: ["Emily","Chloe","Megan","Jessica","Lily","Sarah"], chats: [["Hi! New here? 😊","Add your photo, I want to see you..."],["Hey! Where are you from? 😉","Not registered yet? Let's chat!"],["Wow, handsome guy! 😍","I'd send a video, but you need a profile first..."],["Staying long? Looking for company","Let's go private? Can't send hot stuff here... 🔥"],["Hi! Free today? 😘","New here, looking for a brave guy."],["Wow! Hello handsome! ❤️","Register fast, I have a surprise for you... 😈"]], push: ["Look at this... 🔥","Answer me! 😘"], fixBtn: "QUICK REGISTRATION", ph: "Type a message..." },
        de: { eh: "WARTE!", ep: "147 Mädchen in der Nähe wollen dich treffen. Geh nicht!", ebtn: "BLEIBEN", mh: "Registrierung", mp: "Du musst dich registrieren, um zu chatten und Videos anzusehen.", mbtn: "WEITER", names: ["Lina","Emma","Mia","Sofia","Hannah","Lea"], chats: [["Hi! Neu hier? 😊","Zeig mir dein Foto..."],["Hey! Woher kommst du? 😉","Lass uns chatten!"],["Wow, du siehst gut aus! 😍","Ich würde dir ein Video schicken, aber du brauchst ein Profil..."]], push: ["Schau mal... 🔥","Antworte mir! 😘"], fixBtn: "SCHNELLE REGISTRIERUNG", ph: "Nachricht schreiben..." },
        fr: { eh: "ATTENDS !", ep: "147 filles veulent te rencontrer. Ne pars pas !", ebtn: "RESTER", mh: "Inscription", mp: "Inscris-toi pour discuter et voir des vidéos.", mbtn: "CONTINUER", names: ["Léa","Manon","Chloé","Camille","Sarah","Clara"], chats: [["Salut ! Nouveau ici ? 😊","Mets une photo, je veux te voir..."],["Coucou ! Tu viens d'où ? 😉","On discute ?"]], push: ["Regarde ça... 🔥","Réponds-moi ! 😘"], fixBtn: "INSCRIPTION RAPIDE", ph: "Écrire un message..." },
        tr: { eh: "BEKLE!", ep: "Yakındaki 147 kız seninle tanışmak istiyor. Gitme!", ebtn: "KAL", mh: "Kayıt", mp: "Sohbet etmek ve videoları izlemek için kayıt olmalısın.", mbtn: "DEVAM ET", names: ["Elif","Zeynep","Ece","Merve","Selin","Leyla"], chats: [["Selam! Yeni misin? 😊","Fotoğrafını ekle, seni görmek istiyorum..."],["Selam! Nerelisin? 😉","Hadi konuşalım!"]], push: ["Şuna bak... 🔥","Cevap ver! 😘"], fixBtn: "HIZLI KAYIT", ph: "Mesaj yaz..." },
        pt: { eh: "ESPERE!", ep: "147 garotas por perto querem te conhecer. Não vá!", ebtn: "FICAR", mh: "Registro", mp: "Você precisa se registrar para conversar e ver vídeos.", mbtn: "CONTINUAR", names: ["Ana","Bia","Julia","Maria","Clara","Sara"], chats: [["Oi! Novo aqui? 😊","Adicione uma foto, quero te ver..."],["Oi! De onde você é? 😉","Vamos conversar?"]], push: ["Olha isso... 🔥","Me responde! 😘"], fixBtn: "REGISTRO RÁPIDO", ph: "Escrever mensagem..." }
    };

    const smartlink = "https://tone.affomelody.com/tHHtXh";
    const userLang = navigator.language.split('-')[0];
    const cur = languages[userLang] || languages.en;
    let isChat = false;

    // UI Init
    document.getElementById('eh').innerText = cur.eh; document.getElementById('ep').innerText = cur.ep; document.getElementById('ebtn').innerText = cur.ebtn;
    document.getElementById('mh').innerText = cur.mh; document.getElementById('mp').innerText = cur.mp; document.getElementById('mbtn').innerText = cur.mbtn;
    document.getElementById('fix-btn').innerText = cur.fixBtn; document.getElementById('input-placeholder').innerText = cur.ph;

    function buildList() {
        const container = document.getElementById('chats-container');
        cur.names.forEach((n, i) => {
            const chatPair = cur.chats[i] || cur.chats[0];
            const row = document.createElement('div'); row.className = 'chat-row';
            row.innerHTML = `<img src="${i+2}.jpg" class="avatar"><div class="info"><span class="name">${n}</span><div class="preview">${chatPair[0]}</div></div>`;
            row.onclick = () => { isChat = true; history.pushState({v:'chat'}, ""); openChat(i); };
            container.appendChild(row);
        });
    }

    async function openChat(i) {
        const chatPair = cur.chats[i] || cur.chats[0];
        document.getElementById('c-nm').innerText = cur.names[i];
        document.getElementById('c-av').src = `${i+2}.jpg`;
        const mBox = document.getElementById('m-box');
        const tUi = document.getElementById('typing-ui');
        mBox.querySelectorAll('.bubble, .video-circle').forEach(e => e.remove());
        document.getElementById('chat-screen').style.display = 'flex';

        addB(chatPair[0]);
        await wait(1500); tUi.style.display = 'block'; await wait(2500); tUi.style.display = 'none';
        if(chatPair[1]) addB(chatPair[1]);
        await wait(1200); tUi.style.display = 'block'; await wait(2000); tUi.style.display = 'none';
        
        const v = document.createElement('div'); v.className = 'video-circle'; v.style.display = 'flex';
        v.innerHTML = `<img src="${i+2}.jpg">`; v.onclick = showRegModal;
        mBox.appendChild(v); mBox.scrollTop = 9999;
    }

    function addB(t) {
        const b = document.createElement('div'); b.className = 'bubble'; b.innerText = t;
        document.getElementById('m-box').appendChild(b); document.getElementById('m-box').scrollTop = 9999;
    }

    function handleBack() { history.back(); }
    function showRegModal() { document.getElementById('reg-modal').style.display = 'flex'; }
    function goLink() { window.location.href = smartlink; }
    const wait = ms => new Promise(res => setTimeout(res, ms));

    function initExitLogic() {
        for(let i=0; i<15; i++) { history.pushState({v:'list'}, ""); }
        window.onpopstate = function(event) {
            if (isChat) { document.getElementById('chat-screen').style.display = 'none'; isChat = false; } 
            else { document.getElementById('exit-pop').style.display = 'flex'; history.pushState({v:'list'}, ""); }
        };
    }

    function showPush() {
        const p = document.getElementById('push-note');
        document.getElementById('p-name').innerText = cur.names[Math.floor(Math.random()*cur.names.length)];
        document.getElementById('p-msg').innerText = cur.push[Math.floor(Math.random()*2)];
        document.getElementById('p-img').src = "https://images.pexels.com/photos/1181686/pexels-photo-1181686.jpeg?auto=compress&cs=tinysrgb&w=150";
        p.classList.add('show'); setTimeout(() => p.classList.remove('show'), 5000);
    }

    setInterval(() => { if(!isChat) showPush(); }, 20000);
    setTimeout(showPush, 3000);
    buildList();
    initExitLogic();
</script>
</body>
</html>
