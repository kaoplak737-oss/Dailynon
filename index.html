<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok | Chat</title>
    <style>
        :root { --primary: #fe2c55; --bg: #f8f8f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; overflow: hidden; }

        /* Background Video UI */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

        /* Overlay */
        #chat-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        .chat-card {
            width: 92%; max-width: 380px; height: 85vh;
            background: #fff; border-radius: 24px; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* Header */
        .header { padding: 16px; border-bottom: 1px solid #f1f1f2; display: flex; align-items: center; }
        .avatar-ring { position: relative; width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; margin-right: 12px; }
        .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #4caf50; border: 2px solid #fff; border-radius: 50%; }
        .user-name { font-weight: 700; font-size: 17px; color: #161823; }
        .user-status { font-size: 13px; color: #4caf50; font-weight: 500; }

        /* Messages */
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; background: #f8f8f9; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; animation: pop 0.3s ease; }
        .msg.bot { background: #fff; color: #161823; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Voice Message Bubble */
        .voice-msg { display: flex; align-items: center; gap: 10px; background: #e8e8e8 !important; cursor: pointer; }
        .play-icon { width: 24px; height: 24px; fill: var(--primary); }
        .wave-img { height: 20px; flex: 1; opacity: 0.6; }

        .typing { font-size: 13px; color: var(--primary); font-weight: 600; display: none; padding-left: 5px; }

        /* Lock Block */
        .lock-box { padding: 20px; text-align: center; border-top: 1px solid #f1f1f2; display: none; background: #fff; }
        .lock-icon { width: 40px; margin-bottom: 10px; opacity: 0.8; }
        .lock-title { font-weight: 800; font-size: 18px; margin-bottom: 8px; color: #161823; }
        .lock-desc { font-size: 13px; color: #5e6066; margin-bottom: 15px; line-height: 1.4; }
        .btn-main {
            background: var(--primary); color: #fff; text-decoration: none; display: block;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 15px;
            box-shadow: 0 8px 20px rgba(254, 44, 85, 0.3); animation: heartbeat 1.5s infinite;
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="video-container">
    <video src="./assets/files/video.mp4" loop playsinline autoplay muted></video>
</div>

<div id="chat-overlay">
    <div class="chat-card">
        <div class="header">
            <div class="avatar-ring">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=150&q=80" alt="Avatar">
                <div class="online-dot"></div>
            </div>
            <div>
                <div class="user-name" id="ui-name">Maria</div>
                <div class="user-status" id="ui-online">Online</div>
            </div>
        </div>

        <div class="messages-area" id="chat-box"></div>
        <div class="typing" id="ui-typing">...</div>

        <div class="lock-box" id="lock-ui">
            <img src="https://cdn-icons-png.flaticon.com/512/2553/2553313.png" class="lock-icon">
            <div class="lock-title" id="ui-lock-title">Security Check</div>
            <div class="lock-desc" id="ui-lock-desc">To protect her from bots, please verify your profile to hear the voice message and reply.</div>
            <a href="ТВОЯ_ССЫЛКА_ТУТ" class="btn-main" id="ui-btn">VERIFY & UNLOCK CHAT</a>
        </div>
    </div>
</div>

<script>
    const translations = {
        uk: { name: "Марія", online: "В мережі", typing: "Марія пише...", city: "твого міста", 
              m1: "Привіт! 👋 Побачила твій профіль, ти теж із <b>{city}</b>?", 
              m2: "Я тут шукаю серйозну людину для спілкування, може навіть більше... 😊",
              v: "Голосове повідомлення (0:12)",
              lt: "Перевірка профілю", ld: "Щоб прослухати повідомлення та відповісти Марії, підтвердьте, що ви реальна людина.", lb: "ПІДТВЕРДИТИ ТА ВІДПОВІСТИ" },
        ru: { name: "Мария", online: "В сети", typing: "Мария печатает...", city: "твоего города", 
              m1: "Привет! 👋 Увидела твой профиль, ты тоже из <b>{city}</b>?", 
              m2: "Я тут ищу серьезного мужчину для общения, может даже для семьи... 😊",
              v: "Голосовое сообщение (0:12)",
              lt: "Проверка безопасности", ld: "Чтобы прослушать голос и ответить Марии, подтвердите, что вы реальный человек.", lb: "ПОДТВЕРДИТЬ И ОТВЕТИТЬ" },
        kz: { name: "Мария", online: "Желіде", typing: "Мария жазуда...", city: "сенің қалаңнан", 
              m1: "Сәлем! 👋 Профиліңді көрдім, сен де <b>{city}</b> тұрасың ба?", 
              m2: "Мен мұнда сөйлесуге, мүмкін отбасын құруға болатын байсалды адам іздеймін... 😊",
              v: "Дыбыстық хабарлама (0:12)",
              lt: "Қауіпсіздік тексерісі", ld: "Марияға жауап беру үшін нақты адам екеніңізді растаңыз.", lb: "РАСТАУ ЖӘНЕ ЖАУАП БЕРУ" },
        en: { name: "Maria", online: "Online", typing: "Maria is typing...", city: "your city", 
              m1: "Hey! 👋 Just saw your profile, are you also from <b>{city}</b>?", 
              m2: "I'm looking for a serious man for chatting or maybe more... 😊",
              v: "Voice Message (0:12)",
              lt: "Profile Protection", ld: "To listen to her voice and reply, please confirm you are a real person.", lb: "VERIFY & REPLY" },
        de: { name: "Maria", online: "Online", typing: "Maria schreibt...", city: "deiner Stadt", 
              m1: "Hey! 👋 Habe dein Profil gesehen, kommst du auch aus <b>{city}</b>?", 
              m2: "Ich suche einen ernsthaften Mann für Gespräche, vielleicht sogar für eine Familie... 😊",
              v: "Sprachnachricht (0:12)",
              lt: "Sicherheitscheck", ld: "Um ihre Nachricht zu hören, bestätigen Sie bitte, dass Sie eine echte Person sind.", lb: "BESTÄTIGEN & ANTWORTEN" },
        pl: { name: "Maria", online: "Dostępna", typing: "Maria pisze...", city: "twojego miasta", 
              m1: "Cześć! 👋 Widziałam Twój profil, czy też jesteś z <b>{city}</b>?", 
              m2: "Szukam poważnego mężczyzny do rozmowy, a może czegoś więcej... 😊",
              v: "Wiadomość głosowa (0:12)",
              lt: "Weryfikacja profilu", ld: "Aby odsłuchać wiadomość i odpowiedzieć Marii, potwierdź, że jesteś prawdziwą osobą.", lb: "POTWIERDŹ I ODPOWIEDZ" }
    };

    const userLang = navigator.language.split('-')[0] || 'en';
    const lang = translations[userLang] || translations.en;

    // Set UI
    document.getElementById('ui-name').innerText = lang.name;
    document.getElementById('ui-online').innerText = lang.online;
    document.getElementById('ui-typing').innerText = lang.typing;
    document.getElementById('ui-lock-title').innerText = lang.lt;
    document.getElementById('ui-lock-desc').innerText = lang.ld;
    document.getElementById('ui-btn').innerText = lang.lb;

    async function initChat() {
        const box = document.getElementById('chat-box');
        const typing = document.getElementById('ui-typing');
        let city = lang.city;

        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            if(data.city) city = data.city;
        } catch(e){}

        const addMsg = (html, delay, isVoice = false) => {
            return new Promise(res => {
                typing.style.display = 'block';
                box.scrollTop = box.scrollHeight;
                setTimeout(() => {
                    typing.style.display = 'none';
                    const d = document.createElement('div');
                    d.className = 'msg bot' + (isVoice ? ' voice-msg' : '');
                    if(isVoice) {
                        d.innerHTML = `<svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> <span>${html}</span>`;
                        d.onclick = () => { window.location.href = document.getElementById('ui-btn').href; };
                    } else {
                        d.innerHTML = html.replace('{city}', city);
                    }
                    box.appendChild(d);
                    box.scrollTop = box.scrollHeight;
                    res();
                }, delay);
            });
        };

        await new Promise(r => setTimeout(r, 1000));
        await addMsg(lang.m1, 1500);
        await addMsg(lang.m2, 2200);
        await addMsg(lang.v, 1800, true);

        setTimeout(() => {
            document.getElementById('lock-ui').style.display = 'block';
            box.scrollTop = box.scrollHeight;
        }, 1000);
    }

    window.onload = () => setTimeout(initChat, 1000);
</script>
</body>
</html>
